// ── 1. MORALE SYSTEM ─────────────────────────────────────────
// Morale: 0–100. Affects entertainment score, fan trust, chance of demanding release.
// Drivers: fights booked, wins, contract value relative to tier, idle time, title shots earned/denied

function getMoraleLabel(m){
  if(m>=80)return{label:'Happy',cls:'morale-hi',icon:'😊'};
  if(m>=55)return{label:'Content',cls:'morale-ok',icon:'😐'};
  if(m>=35)return{label:'Unhappy',cls:'morale-lo',icon:'😤'};
  return{label:'Furious',cls:'morale-lo',icon:'🤬'};
}

function initMorale(f){
  // Base morale by tier; champions start happy
  const base={champion:85,elite:75,contender:65,prospect:60}[f.tier]||65;
  f.morale=base+ri(-5,5);
}

function tickMorale(){
  if(!G||!G.roster)return;
  const now=(G.yr*48)+(G.mo*4)+G.wk;
  G.roster.forEach(f=>{
    if(f.morale===undefined)f.morale=70;
    let delta=0;
    // Idle penalty: weeks since last fight
    const lastFight=f.lastFightYr?(f.lastFightYr*48+f.lastFightMo*4+f.lastFightWk):0;
    const idleWks=lastFight?now-lastFight:52;
    if(idleWks>20)delta-=0.8;
    else if(idleWks>12)delta-=0.4;
    else if(idleWks<8)delta+=0.3;
    // Contract expiry stress
    if(f.contract&&f.contract.fightsLeft<=1)delta-=0.6;
    // Champion happiness
    if(f.isChamp)delta+=0.4;
    // Underpaid vs tier (compare show money to tier expectation)
    const expected={champion:300000,elite:80000,contender:25000,prospect:8000}[f.tier]||12000;
    if((f.contract?.show||0)<expected*0.6)delta-=0.5;
    else if((f.contract?.show||0)>expected*1.4)delta+=0.2;
    // Clamp
    f.morale=Math.min(100,Math.max(0,(f.morale||70)+delta));

    // Demand logic: fighters below 30 morale may demand release or renegotiation
    if(f.morale<30&&Math.random()<0.08){
      const demand=f.morale<15?'release':'renegotiate';
      // Only fire once per fighter (check pendingDemands)
      G.pendingDemands=G.pendingDemands||[];
      if(!G.pendingDemands.find(d=>d.fid===f.id)){
        G.pendingDemands.push({fid:f.id,type:demand,wk:G.wk,mo:G.mo,yr:G.yr});
        G.log.push('😤 <fighter:'+f.name+'> is unhappy and demanding '+(demand==='release'?'a release':'contract renegotiation')+'!');
      }
    }
  });
}

// ── 2. RETIREMENT SYSTEM ─────────────────────────────────────
// Age-based retirement probability. Champions retire less. High morale delays retirement.

function checkRetirements(){
  if(!G||!G.roster)return;
  const retirees=[];
  G.roster.forEach(f=>{
    const age=f.age||25;
    if(age<32)return; // nobody retires before 32
    // Base chance per week: rises sharply after 37
    let chance=0;
    if(age>=42)chance=0.025;
    else if(age>=40)chance=0.015;
    else if(age>=38)chance=0.008;
    else if(age>=35)chance=0.004;
    else chance=0.001;
    // Modifiers
    if(f.isChamp)chance*=0.3; // champs retire much less
    if((f.morale||70)<40)chance*=1.8; // unhappy fighters retire sooner
    if(f.status==='injured'&&f.injuryWeeksLeft>8)chance*=2; // bad injury pushes retirement
    if(f.rec&&f.rec.l>f.rec.w)chance*=1.4; // bad record
    if(Math.random()<chance){
      retirees.push(f);
    }
  });
  retirees.forEach(f=>{
    f.status='retired';
    f.retiredYr=G.yr;
    if(f.isChamp){
      f.isChamp=false;
      G.log.push('🏆 VACANT: <fighter:'+f.name+'> retired as champion — '+( ALL_WCN[f.weightClass]||f.weightClass)+' title is VACANT!');
      G.promo.legit=Math.max(0,G.promo.legit-5);
    } else {
      G.log.push('👴 <fighter:'+f.name+'> (Age '+Math.floor(f.age)+') has retired.');
    }
    // Move to retired pool, off active roster
    G.retired=G.retired||[];
    G.retired.push({...f});
    G.roster=G.roster.filter(r=>r.id!==f.id);
    // Hall of Fame check on retirement
    if(evaluateHof(f)){injectHof(G.retired[G.retired.length-1]);}
  });
}

// ── 3. CONTRACT NEGOTIATION SYSTEM ───────────────────────────
// When signing a FA or renewing, player gets 3 offer tiers to choose from.
// Fighter may reject low offers based on their tier + morale.

function openNegotiation(fid, isRenewal=false){
  const f=isRenewal?G.roster.find(x=>x.id===fid):G.fa.find(x=>x.id===fid);
  if(!f)return;
  // Build 3 offer options
  const baseCT=CT[f.tier]||CT.prospect;
  const starAvg=f.s?.mkt&&f.s?.cha?(f.s.mkt+f.s.cha)/2:60;
  const starMult=starAvg<65?1:1+Math.pow((starAvg-65)/35,1.6)*11;
  // Low / fair / generous
  const offers=[
    {label:'Lowball',desc:'Minimum viable offer. Fighter may reject.',fights:baseCT.fights,show:Math.round(baseCT.show*starMult*0.65/1000)*1000,win:Math.round(baseCT.win*starMult*0.65/1000)*1000,rejectChance:f.tier==='champion'?0.9:f.tier==='elite'?0.7:f.tier==='contender'?0.45:0.2},
    {label:'Fair Market',desc:'Standard offer. Usually accepted.',fights:baseCT.fights,show:Math.round(baseCT.show*starMult*1.0/1000)*1000,win:Math.round(baseCT.win*starMult*1.0/1000)*1000,rejectChance:f.tier==='champion'?0.35:f.tier==='elite'?0.15:0.05},
    {label:'Premium',desc:'Above market. Fighter will be very happy.',fights:baseCT.fights+2,show:Math.round(baseCT.show*starMult*1.5/1000)*1000,win:Math.round(baseCT.win*starMult*1.5/1000)*1000,rejectChance:0},
  ];
  UI.modal={type:'negotiate',fid,isRenewal,fighter:f,offers,selectedOffer:1};
  render();
}

function resolveNegotiation(offerIdx){
  const m=UI.modal;
  if(!m||m.type!=='negotiate')return;
  const offer=m.offers[offerIdx];
  const f=m.isRenewal?G.roster.find(x=>x.id===m.fid):G.fa.find(x=>x.id===m.fid);
  if(!f){UI.modal=null;render();return;}
  // Morale modifier on reject chance
  const moraleAdj=(f.morale||70)<50?0.1:(f.morale||70)>80?-0.1:0;
  const finalReject=Math.max(0,offer.rejectChance+moraleAdj);
  if(Math.random()<finalReject){
    // Fighter rejects
    G.log.push('❌ '+f.name+' rejected your '+offer.label+' offer!');
    if(f.morale!==undefined)f.morale=Math.max(0,f.morale-10);
    UI.modal={type:'negotiateRejected',fighter:f,offerLabel:offer.label};
    render();return;
  }
  // Accepted
  const newContract={fights:offer.fights,show:offer.show,win:offer.win,fightsLeft:offer.fights,ppv:0};
  const signingFee=Math.round(offer.show*0.4);
  if(G.fin.cash<signingFee){alert('Need '+fm(signingFee)+' signing fee!');UI.modal=null;render();return;}
  G.fin.cash-=signingFee;
  if(m.isRenewal){
    f.contract=newContract;
    f.salary=offer.show+offer.win;
    if(f.morale!==undefined)f.morale=Math.min(100,f.morale+15);
    G.log.push('✅ Renewed <fighter:'+f.name+'> on '+offer.label+' deal | '+ctLabel(newContract));
  } else {
    const idx=G.fa.findIndex(x=>x.id===m.fid);
    if(idx>=0)G.fa.splice(idx,1);
    f.promo=G.promo.id;f.contract=newContract;f.salary=offer.show+offer.win;
    if(f.morale===undefined)initMorale(f);
    f.morale=Math.min(100,(f.morale||70)+10);
    G.roster.push(f);
    G.log.push('✅ Signed <fighter:'+f.name+'> on '+offer.label+' deal | Fee: '+fm(signingFee)+' | '+ctLabel(newContract));
  }
  UI.modal=null;render();
}

// ── 4. TITLE DEFENSE SYSTEM ──────────────────────────────────
// Champions must defend every ~16 weeks or face mandatory defense pressure.
// At 20 weeks, title is put on notice. At 28 weeks, stripped.

function checkTitleDefenses(){
  if(!G||!G.roster)return;
  const now=(G.yr*48)+(G.mo*4)+G.wk;
  G.roster.filter(f=>f.isChamp).forEach(f=>{
    const lastDef=f.lastFightYr?(f.lastFightYr*48+f.lastFightMo*4+f.lastFightWk):((G.yr-1)*48+1);
    const wksHeld=now-lastDef;
    if(wksHeld>=45&&!f.titleStripWarned){
      // Strip the title
      f.isChamp=false;f.tier='elite';f.titleStripWarned=false;
      G.log.push('🚨 <fighter:'+f.name+'> STRIPPED of '+(ALL_WCN[f.weightClass]||f.weightClass)+' title after '+wksHeld+' weeks without a defense!');
      G.promo.legit=Math.max(0,G.promo.legit-8);
      G.promo.fanTrust=Math.max(0,G.promo.fanTrust-5);
      if(!G.vacantTitles)G.vacantTitles={};
      G.vacantTitles[f.weightClass]=true;
    } else if(wksHeld>=36&&!f.titleStripWarned){
      f.titleStripWarned=true;
      G.log.push('⚠️ <fighter:'+f.name+'> — '+(ALL_WCN[f.weightClass]||'')+' title on notice! Book a defense or it\'ll be stripped ('+Math.round(45-wksHeld)+' weeks left).');
    }
    if(wksHeld<36&&f.titleStripWarned)f.titleStripWarned=false;
  });
}

// Determine #1 contender for a weight class (highest ranked non-champ)
function getContender(wc){
  const ranked=G.roster.filter(f=>f.weightClass===wc&&!f.isChamp&&f.status!=='retired')
    .sort((a,b)=>(b.rankPts||0)-(a.rankPts||0));
  return ranked[0]||null;
}

// ── 5. WEIGHT CLASS TRANSFER ─────────────────────────────────
function moveWeightClass(fid, newWC){
  const f=G.roster.find(x=>x.id===fid);
  if(!f)return;
  const old=f.weightClass;
  f.weightClass=newWC;
  f.rankPts=200; // reset ranking in new division
  f.rankPrev=null;
  f.morale=Math.min(100,(f.morale||70)+5); // slight morale boost — fresh start
  G.log.push('⚖️ <fighter:'+f.name+'> moved from '+(ALL_WCN[old]||old)+' → '+(ALL_WCN[newWC]||newWC));
  UI.modal=null;render();
}

// ── 6. DEMAND RESOLUTION ─────────────────────────────────────
function resolveDemand(fid, accept){
  G.pendingDemands=G.pendingDemands||[];
  const idx=G.pendingDemands.findIndex(d=>d.fid===fid);
  if(idx<0)return;
  const demand=G.pendingDemands.splice(idx,1)[0];
  const f=G.roster.find(x=>x.id===fid);
  if(!f)return;
  if(demand.type==='release'){
    if(accept){
      releaseF(fid);
      G.log.push('🚪 Granted <fighter:'+f.name+">'s release request.");
    } else {
      f.morale=Math.max(0,(f.morale||70)-20);
      G.log.push('😡 Denied <fighter:'+f.name+">'s release — morale tanked further.");
    }
  } else {
    if(accept){
      openNegotiation(fid,true);return;
    } else {
      f.morale=Math.max(0,(f.morale||70)-15);
      G.log.push('😤 Denied <fighter:'+f.name+">'s renegotiation — they are furious.");
    }
  }
  render();
}

const LEGACY_TIERS=[
  {id:'local',    label:'Local Star',     min:0,   cls:'lt-local'},
  {id:'contender',label:'Top Contender',  min:30,  cls:'lt-contender'},
  {id:'champion', label:'Champion',       min:80,  cls:'lt-champion'},
  {id:'legend',   label:'Legend',         min:160, cls:'lt-legend'},
  {id:'great',    label:'All-Time Great', min:280, cls:'lt-great'},
  {id:'goatc',    label:'GOAT Contender', min:440, cls:'lt-goatc'},
  {id:'goat',     label:'GOAT',           min:650, cls:'lt-goat'},
];

function getLegacyTier(score){
  for(let i=LEGACY_TIERS.length-1;i>=0;i--){
    if(score>=LEGACY_TIERS[i].min)return LEGACY_TIERS[i];
  }
  return LEGACY_TIERS[0];
}

function ltTag(score){
  const t=getLegacyTier(score||0);
  return S('tag '+t.cls,[t.label]);
}

function calcGoatDelta(result, fighter, isWinner, isTitle, oppRankPts, promoPrestige, bonuses){
  let d=0;
  if(isWinner){
    d+=2; // win
    if(result.method==='KO/TKO'||result.method==='Submission') d+=2; // finish
    if(isTitle){
      if(fighter.isChamp) d+=5; // title defense
      else d+=6; // title win
      d+=3; // championship fight bonus
    }
    // Bonus awards
    if(bonuses){
      if(bonuses.find(b=>b.fighter?.id===fighter.id&&b.label.includes('Night'))) d+=2;
    }
    // Streak bonus (after 5 wins in a row)
    const streak=fighter.winStreak||0;
    if(streak>=5) d+= Math.min(4,Math.floor((streak-4)/1));
    // Opponent quality bonus
    const oppBonus=Math.round((oppRankPts-400)/200); // +1 to +3 for beating top fighters
    d+=Math.max(0,Math.min(3,oppBonus));
    // Promo prestige multiplier (small)
    if(promoPrestige>=80) d+=1;
  } else {
    d-=1; // loss
  }
  // Entertainment score bonus
  if(result.ent>=90) d+=2;
  else if(result.ent>=80) d+=1;
  return d;
}

function updateGoatScores(results, ev, bonuses){
  // Called after every event. results = array of fight result objects.
  results.forEach(r=>{
    const win=G.roster.find(f=>f.id===r.wId);
    const lose=G.roster.find(f=>f.id===r.lId);
    const oppWinPts=lose?.rankPts||400;
    const oppLosePts=win?.rankPts||400;
    if(win){
      if(win.goatScore===undefined)win.goatScore=0;
      win.winStreak=(win.winStreak||0)+1;
      win.goatScore+=calcGoatDelta(r,win,true,r.title,oppWinPts,G.promo.prestige,bonuses);
      win.goatScore=Math.max(0,win.goatScore);
      checkMilestones(win, r, true);
    }
    if(lose){
      if(lose.goatScore===undefined)lose.goatScore=0;
      lose.winStreak=0;
      lose.goatScore+=calcGoatDelta(r,lose,false,r.title,oppLosePts,G.promo.prestige,bonuses);
      lose.goatScore=Math.max(0,lose.goatScore);
      checkMilestones(lose, r, false);
    }
  });
  // Longevity bonus monthly (called from advWeek on mo==1)
  // handled in tickLegacyMonthly
}

function tickLegacyMonthly(){
  // Give active fighters longevity points and update P4P ranking tag
  if(!G||!G.roster)return;
  G.roster.forEach(f=>{
    if(f.status==='retired')return;
    if(f.goatScore===undefined)f.goatScore=0;
    // +1 per active year (approx monthly: +1/12)
    f._legacyMonths=(f._legacyMonths||0)+1;
    if(f._legacyMonths%12===0) f.goatScore+=1;
    // P4P #1 bonus: tracked separately, awarded in updateGoatRanks
  });
  updateGoatRanks();
  checkEras();
}

function updateGoatRanks(){
  // Rank all fighters across all rosters by goatScore
  const allF=getAllFighters();
  allF.sort((a,b)=>(b.goatScore||0)-(a.goatScore||0));
  allF.forEach((f,i)=>{
    const prevRank=f.goatRank;
    f.goatRank=i+1;
    // P4P #1 bonus (top ranked active fighter from player roster gets +10 once)
    if(i===0&&!f._p4p1Bonus&&f.promo===G.promo.id){
      f.goatScore+=10;f._p4p1Bonus=true;
      G.log.push('🐐 <fighter:'+f.name+'> has reached #1 on the GOAT leaderboard! (+10 GOAT pts)');
    }
    f.legacyTier=getLegacyTier(f.goatScore||0).id;
  });
}

function getAllFighters(){
  const all=[...G.roster,...(G.retired||[])];
  G.rivals.forEach(rv=>(rv.roster||[]).forEach(f=>{ if(!all.find(x=>x.id===f.id))all.push(f); }));
  return all;
}

function checkMilestones(f, result, isWin){
  if(!f)return;
  f.milestones=f.milestones||[];
  f.careerTimeline=f.careerTimeline||[];
  // Title tracking
  if(isWin&&result.title&&!f.milestones.includes('champ')){
    f.milestones.push('champ');
    f.champDivs=f.champDivs||[];
    if(!f.champDivs.includes(f.weightClass))f.champDivs.push(f.weightClass);
    f.careerTimeline.push({yr:G.yr,mo:G.mo,event:'Won '+( ALL_WCN[f.weightClass]||f.weightClass)+' Championship 🏆',big:true});
  }
  // Title defense tracking
  if(isWin&&result.title&&f.isChamp){
    f.titleDefs=(f.titleDefs||0)+1;
    if(f.titleDefs===3||f.titleDefs===5||f.titleDefs===10){
      f.careerTimeline.push({yr:G.yr,mo:G.mo,event:f.titleDefs+'th Title Defense 🛡',big:true});
    }
  }
  // Two-division check
  if(isWin&&result.title){
    f.champDivs=f.champDivs||[];
    if(!f.champDivs.includes(f.weightClass))f.champDivs.push(f.weightClass);
    if(f.champDivs.length>=2&&!f.milestones.includes('champchamp')){
      f.milestones.push('champchamp');
      f.careerTimeline.push({yr:G.yr,mo:G.mo,event:'Two-Division Champion! 👑',big:true});
      G.log.push('👑 <fighter:'+f.name+'> becomes a TWO-DIVISION CHAMPION!');
    }
  }
  // Record milestones
  [10,20,30].forEach(n=>{
    const mid='win'+n;
    if(f.rec.w===n&&!f.milestones.includes(mid)){
      f.milestones.push(mid);
      f.careerTimeline.push({yr:G.yr,mo:G.mo,event:n+'th Career Win 🥊'});
    }
  });
  // Streak milestones
  if(isWin){
    [5,10].forEach(n=>{
      const mid='streak'+n;
      if((f.winStreak||0)===n&&!f.milestones.includes(mid)){
        f.milestones.push(mid);
        f.careerTimeline.push({yr:G.yr,mo:G.mo,event:n+'-Fight Win Streak 🔥',big:n===10});
        if(n>=5)G.log.push('🔥 <fighter:'+f.name+'> is on a '+n+'-fight win streak!');
      }
    });
  }
  // GOAT tier milestones
  const tier=getLegacyTier(f.goatScore||0);
  const tierMilId='tier_'+tier.id;
  if(!f.milestones.includes(tierMilId)&&tier.id!=='local'){
    f.milestones.push(tierMilId);
    f.careerTimeline.push({yr:G.yr,mo:G.mo,event:'Reached '+tier.label+' status '+tier.cls.includes('goat')?'🐐':'🌟',big:tier.id==='great'||tier.id==='goatc'||tier.id==='goat'});
    if(tier.id==='legend'||tier.id==='great'||tier.id==='goatc'||tier.id==='goat'){
      G.log.push((tier.id==='goat'?'🐐':'🌟')+' <fighter:'+f.name+'> has reached '+tier.label+' status!');
    }
  }
}

// ── HALL OF FAME ──────────────────────────────────────────────
function evaluateHof(f){
  // Called when fighter retires
  if(!f)return false;
  let pts=0;
  if(f.rec.w>=20) pts+=2;
  if(f.rec.w>=30) pts+=2;
  if((f.titleDefs||0)>=3) pts+=3;
  if((f.titleDefs||0)>=7) pts+=3;
  if((f.goatScore||0)>=150) pts+=3;
  if((f.goatScore||0)>=300) pts+=3;
  if((f.champDivs||[]).length>=2) pts+=3;
  if((f.winStreak||0)>=10) pts+=2;
  if((f.fotnCount||0)>=3) pts+=1;
  const tierIdx=LEGACY_TIERS.findIndex(t=>t.id===getLegacyTier(f.goatScore||0).id);
  if(tierIdx>=3) pts+=2; // legend+
  if(tierIdx>=5) pts+=3; // goat contender+
  return pts>=6;
}

function injectHof(f){
  f.hallOfFame=true;
  f.hofYear=G.yr;
  G.hof=G.hof||[];

// ── DYNAMIC ERAS ─────────────────────────────────────────────
function checkEras(){
  if(!G)return;
  G.eras=G.eras||[];
  const retired=G.retired||[];
  // Era triggered by: 3+ champions retiring within a 2-year span, or every 10 years
  const recentRetirements=retired.filter(f=>(f.milestones||[]).includes('champ')&&f.retiredYr&&G.yr-f.retiredYr<=2);
  const lastEraYr=(G.eras[G.eras.length-1]?.endYr)||(G.yr-11);
  if((recentRetirements.length>=3||G.yr-lastEraYr>=10)&&(G.eras.length===0||G.yr>((G.eras[G.eras.length-1]?.startYr)||0)+4)){
    // Generate era name from dominant style/nationality of retiring champions
    const nat=recentRetirements.map(f=>f.nat||'').join(' ');
    let eraName='New Era';
    if(nat.includes('Russian')||nat.includes('Dagestani'))eraName='The Dagestani Era';
    else if(nat.includes('Brazilian'))eraName='The Brazilian Era';
    else if(nat.includes('American'))eraName='The American Era';
    else if(nat.includes('Georgian')||nat.includes('British'))eraName='The European Era';
    else if(nat.includes('Chinese')||nat.includes('Korean')||nat.includes('Japanese'))eraName='The Asian Era';
    else eraName='Era of '+(recentRetirements[0]?.name||'Champions');
    // Close previous era
    if(G.eras.length>0)G.eras[G.eras.length-1].endYr=G.yr;
    const topFighter=getAllFighters().filter(f=>f.promo===G.promo.id).sort((a,b)=>(b.goatScore||0)-(a.goatScore||0))[0];
    G.eras.push({
      name:eraName,startYr:G.yr,endYr:null,
      topFighter:topFighter?.name||'Unknown',
      topPromo:G.promo.name,
      retired:recentRetirements.map(f=>f.name),
    });
    G.log.push('📜 A new era begins: "'+eraName+'" ('+G.yr+')');
  }
}

// ── PROSPECT SCORING ─────────────────────────────────────────
function calcProspectScore(f){
  const age=Math.floor(f.age||24);
  const agePeak=age<=22?1.2:age<=25?1.1:age<=28?1.0:age<=31?0.85:0.65;
  const pot=f.potential||(ov(f)>75?'A':ov(f)>65?'B':'C');
  const potMult={'S':1.4,'A':1.2,'B':1.0,'C':0.8}[pot]||1.0;
  const finishRate=(f.rec.w>0&&(f.rec.w/(f.rec.w+f.rec.l+.001))>0.7)?1.1:1.0;
  const streak=Math.min(10,f.winStreak||0);
  const base=((ov(f)-40)/60)*100; // 0-100
  return Math.round(base*agePeak*potMult*finishRate + streak*2);
}

// ── PROMOTION LEGACY SCORE ───────────────────────────────────
function calcPromoLegacy(promo, roster, hofList, events){
  let s=0;
  s+=Math.round((promo.prestige||50)*8);
  s+=Math.round((promo.fanTrust||50)*4);
  s+=(hofList||[]).length*50;
  s+=(roster||[]).filter(f=>getLegacyTier(f.goatScore||0).id!=='local').length*5;
  s+=(roster||[]).filter(f=>(f.titleDefs||0)>=3).length*20;
  s+=(events||[]).filter(e=>e.avgEnt>=80).length*3;
  s+=(events||[]).length*1;
  s+=Math.round((promo.revenue||0)/1e6);
  return s;
}

// ── NARRATIVE ENGINE ─────────────────────────────────────────
function generateNarrative(ev){
  if(!ev||!ev.results||!ev.results.length)return null;

  const findF=id=>G.roster.find(f=>f.id===id)||(G.retired||[]).find(f=>f.id===id);
  const evName=ev.name||(G.promo.name+' '+ev.tier);
  const lines=[];

  // Overall card tone
  const avgEnt=ev.avgEnt||50;
  const stars=ev.stars||0;
  const cardTone=avgEnt>=82?'delivered a spectacular night of violence':
    avgEnt>=72?'put on a solid show for the fans':
    avgEnt>=58?'was a mixed bag — some highs, plenty of lows':
    avgEnt>=44?'struggled to hold the crowd\'s attention':
    'was a disappointment from top to bottom';
  lines.push(evName+' '+cardTone+'.');

  // Write about each fight (results[0] = main event)
  ev.results.forEach((r,i)=>{
    const win=findF(r.wId);
    const lose=findF(r.lId);
    if(!win||!lose)return;
    const isMain=i===0;
    const isCoMain=i===1;
    const label=isMain?'In the main event':isCoMain?'In the co-main event':'On the undercard';
    const method=r.method;
    const rd=r.round;
    const ent=r.ent||50;

    // Craft result sentence — no "stopped" for decisions
    let resultLine='';
    if(method==='KO/TKO'){
      const koVerbs=['knocked out','stopped via TKO','finished','put away','hurt and stopped'];
      resultLine=win.name+' '+koVerbs[Math.floor(Math.random()*koVerbs.length)]+' '+lose.name+' in round '+rd+'.';
    } else if(method==='Submission'){
      const subVerbs=['submitted','tapped out','forced a tap from','caught'];
      resultLine=win.name+' '+subVerbs[Math.floor(Math.random()*subVerbs.length)]+' '+lose.name+' in round '+rd+'.';
    } else {
      // Decision variants
      const decLabel=method==='Unanimous Decision'?'a unanimous decision':method==='Split Decision'?'a contentious split decision':'a majority decision';
      resultLine=win.name+' outpointed '+lose.name+' over three rounds, taking '+decLabel+'.';
    }

    // Entertainment colour commentary
    let entLine='';
    if(ent>=88){
      const adj=['breathtaking','instant classic','a candidate for fight of the year'];
      entLine='It was '+adj[Math.floor(Math.random()*adj.length)]+' — both men left everything in the cage.';
    } else if(ent>=76){
      entLine='The fight delivered, with plenty of back-and-forth action that kept fans on their feet.';
    } else if(ent>=62){
      entLine='It was decent enough — not a classic, but a competitive scrap.';
    } else if(ent>=48){
      if(method.includes('Decision')){
        entLine='The crowd grew restless as both fighters played it safe, content to work behind jabs and clinch work with little urgency.';
      } else {
        entLine='It was an ugly, scrappy affair that never found a rhythm.';
      }
    } else if(ent>=35){
      if(method.includes('Decision')){
        entLine='The bout was roundly booed by the end — a stalling, grinding decision that felt like it lasted twice as long as it did. Expect calls for both men to be cut if this continues.';
      } else {
        entLine='Even the finish couldn\'t save the fight\'s reputation — it was a chore to watch up to that point.';
      }
    } else {
      entLine='This was one of the worst fights seen in recent memory. Boos rained down, and it will not be forgotten for the wrong reasons. The matchmaker has questions to answer.';
    }

    // Title implications
    let titleLine='';
    if(r.title){
      if(win.isChamp){
        titleLine=win.name+' now has '+(win.titleDefs||1)+' title defense'+(( win.titleDefs||1)!==1?'s':'')+', sitting at #'+(win.goatRank||'?')+' on the all-time GOAT leaderboard.';
      } else {
        titleLine='A new champion is crowned. '+(lose.name)+' has lost the belt after '+(lose.titleDefs||0)+' defense'+(( lose.titleDefs||0)!==1?'s':'')+'.';
      }
    } else if(isMain||isCoMain){
      // Contender implications for main/co-main non-title fights
      if(ent<40&&method.includes('Decision')){
        titleLine='A performance like that will do nothing for '+win.name+'\'s title case — a win is a win, but the fans aren\'t buying it.';
      } else if((win.goatRank||999)<10){
        titleLine=win.name+' strengthens a legitimate title claim with the victory.';
      }
    }

    // Prospect callout on the undercard
    let prospectLine='';
    if(!isMain&&!isCoMain&&win?.tier==='prospect'&&(win.winStreak||0)>=2){
      prospectLine=win.name+' improves to '+(win.rec.w)+'-'+(win.rec.l)+' — a name to watch.';
    }

    lines.push(label+', '+resultLine);
    if(entLine)lines.push(entLine);
    if(titleLine)lines.push(titleLine);
    if(prospectLine)lines.push(prospectLine);
  });

  // Night bonuses
  const fotn=ev.bonuses?.find(b=>b.label.includes('Fight'));
  if(fotn&&fotn.fighter&&fotn.fighter2){
    lines.push(fotn.fighter.name+' vs '+fotn.fighter2.name+' took home Fight of the Night honours.');
  }
  const kotn=ev.bonuses?.find(b=>b.label.includes('KO'));
  if(kotn&&kotn.fighter){
    lines.push(kotn.fighter.name+' earned Performance of the Night for the finish.');
  }

  return lines;
}

function vRegions(){
  const rp=G.regionalPresence||{};
  const levelNames=['None','Foothold','Established','Dominant'];
  const levelColors=['var(--tx3)','#e67e22','#2980b9','#27ae60'];
  const levelIcons=['○','◑','◕','●'];

  const cards=Object.entries(REGION_DEFS).map(([rid,rDef])=>{
    const level=rp[rid]||0;
    const nextLevel=level+1;
    const maxed=level>=3;
    const nextCost=maxed?0:rDef.investCost[nextLevel];
    const canAfford=!maxed&&G.fin.cash>=nextCost;
    const travelDiscount=Math.round(level*rDef.perLevelBonus.travelDiscount*100);
    const fillBoost=Math.round(level*rDef.perLevelBonus.fillBoost*100);
    const presBoost=Math.round(level*rDef.perLevelBonus.presBonus*10)/10;
    // Count roster fighters from this region
    const homeFighters=G.roster.filter(f=>rDef.natKeywords.some(kw=>(f.nat||'').includes(kw))).length;
    // Count events run in this region
    const regionEvents=G.events.filter(e=>{
      const loc=EVENT_LOCATIONS.find(l=>l.id===e.locationId);
      return loc&&LOC_TO_REGION[loc.id]===rid;
    }).length;

    return D('card',[
      h('div',{style:{display:'flex',alignItems:'center',gap:'10px',marginBottom:'10px'}},[
        h('div',{style:{fontSize:'28px',lineHeight:'1'}},[rDef.icon]),
        h('div',{style:{flex:'1'}},[
          h('div',{style:{fontWeight:'800',fontSize:'14px'}},[rDef.name]),
          h('div',{style:{fontSize:'12px',color:'var(--tx2)',marginTop:'2px'}},[rDef.desc]),
        ]),
        h('div',{style:{textAlign:'center',flexShrink:'0'}},[
          h('div',{style:{fontSize:'22px',color:levelColors[level],fontWeight:'900'}},[levelIcons[level]]),
          h('div',{style:{fontSize:'10px',fontWeight:'700',color:levelColors[level],textTransform:'uppercase',letterSpacing:'0.5px'}},[levelNames[level]]),
        ]),
      ]),
      // Presence progress bar
      h('div',{style:{marginBottom:'10px'}},[
        h('div',{style:{display:'flex',justifyContent:'space-between',fontSize:'11px',color:'var(--tx3)',marginBottom:'3px'}},[
          h('span',{},'Presence Level '+level+'/3'),
          level>0?h('span',{style:{color:levelColors[level]}},[levelNames[level]]):null,
        ]),
        h('div',{style:{height:'6px',background:'var(--bg3)',borderRadius:'3px',overflow:'hidden'}},[
          h('div',{style:{height:'100%',width:Math.round(level/3*100)+'%',background:levelColors[level],borderRadius:'3px',transition:'width .3s'}}),
        ]),
      ]),
      // Bonuses
      level>0?h('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'6px',marginBottom:'10px'}},[
        D('kpi',[D('kpi-l',['Travel']),h('div',{style:{fontWeight:'800',fontSize:'14px',color:'var(--grn)'}},['-'+travelDiscount+'%'])]),
        D('kpi',[D('kpi-l',['Fill Rate']),h('div',{style:{fontWeight:'800',fontSize:'14px',color:'var(--blu)'}},['+'+fillBoost+'%'])]),
        D('kpi',[D('kpi-l',['Prestige']),h('div',{style:{fontWeight:'800',fontSize:'14px',color:'var(--gold)'}},['+'+presBoost])]),
      ]):null,
      // Stats row
      h('div',{style:{display:'flex',gap:'12px',fontSize:'12px',color:'var(--tx2)',marginBottom:'10px'}},[
        h('span',{},[rDef.flag+' '+homeFighters+' roster fighters']),
        h('span',{style:{color:'var(--tx3)'}},'·'),
        h('span',{},[regionEvents+' events run']),
      ]),
      // Locations in this region
      h('div',{style:{display:'flex',gap:'4px',flexWrap:'wrap',marginBottom:'10px'}},[
        ...rDef.locations.map(lid=>{
          const loc=EVENT_LOCATIONS.find(l=>l.id===lid);
          if(!loc)return null;
          const effCost=getEffectiveTravelCost(lid);
          const origCost=loc.travelCost||0;
          return h('div',{style:{background:'var(--bg3)',border:'1px solid var(--bd)',borderRadius:'5px',padding:'3px 7px',fontSize:'11px',fontWeight:'600'}},[
            loc.name,
            origCost>0?h('span',{style:{color:level>0?'var(--grn)':'var(--tx3)',marginLeft:'4px'}},[
              level>0&&effCost<origCost?('✓ '+fm(effCost)):('✈ '+fm(origCost))
            ]):h('span',{style:{color:'var(--grn)',marginLeft:'4px'}},'✓ Home'),
          ]);
        }),
      ]),
      // Invest button
      maxed
        ?h('div',{style:{padding:'7px',background:'rgba(39,174,96,.08)',border:'1px solid rgba(39,174,96,.3)',borderRadius:'7px',textAlign:'center',fontSize:'12px',fontWeight:'700',color:'var(--grn)'}},'✅ Maximum presence reached')
        :h('div',{style:{display:'flex',alignItems:'center',gap:'8px'}},[
            Btn(
              (level===0?'Enter Market':'Expand Presence')+' — '+fm(nextCost),
              ()=>investRegion(rid),
              'btn '+(canAfford?'btn-g':'btn-s')+' btn-fw',
              !canAfford
            ),
          ]),
    ]);
  });

  const totalInvested=Object.entries(rp).reduce((s,[rid,lv])=>{
    const rDef=REGION_DEFS[rid];
    if(!rDef)return s;
    let t=0;for(let i=1;i<=lv;i++)t+=rDef.investCost[i]||0;
    return s+t;
  },0);
  const activeRegions=Object.values(rp).filter(v=>v>0).length;

  return D('page',[
    D('ptitle',['🌍 Regional Expansion']),
    D('psub',['Build presence in regions to reduce travel costs, boost attendance, and unlock home market advantages.']),
    // Summary KPIs
    D('g4',[
      D('kpi',[D('kpi-l',['Active Regions']),h('div',{cls:'kpi-v',style:{color:'var(--blu)'}},[activeRegions+''])]),
      D('kpi',[D('kpi-l',['Total Invested']),h('div',{cls:'kpi-v',style:{color:'var(--gold)'}},[fm(totalInvested)])]),
      D('kpi',[D('kpi-l',['Cash']),h('div',{cls:'kpi-v',style:{color:G.fin.cash<2e6?'var(--red)':'var(--grn)'}},[fm(G.fin.cash)])]),
      D('kpi',[D('kpi-l',['Home Fighters']),h('div',{cls:'kpi-v'},[G.roster.filter(f=>Object.entries(rp).some(([rid,lv])=>lv>0&&REGION_DEFS[rid]?.natKeywords.some(kw=>(f.nat||'').includes(kw)))).length+''])]),
    ],{marginBottom:'16px'}),
    // How it works explainer
    h('div',{style:{background:'rgba(41,128,185,.07)',border:'1px solid rgba(41,128,185,.25)',borderRadius:'10px',padding:'12px 16px',marginBottom:'16px',fontSize:'12px',lineHeight:'1.6'}},[
      h('div',{style:{fontWeight:'800',fontSize:'13px',marginBottom:'6px'}},'📖 How Regional Presence Works'),
      h('ul',{style:{paddingLeft:'18px',color:'var(--tx2)'}},[
        h('li',{},'Level 1 (Foothold): Reduced travel costs, small fill rate boost'),
        h('li',{},'Level 2 (Established): Bigger discounts, fighters from this region boost gate revenue'),
        h('li',{},'Level 3 (Dominant): Max bonuses + home market fighters give extra prestige per event'),
        h('li',{style:{color:'var(--gold)'}},'💡 Tip: Match fighters with home market crowds for a 3% gate boost each!'),
      ]),
    ]),
    D('fg',[...cards]),
  ]);
}

      h('button',{
        cls:'ndrop-trigger'+(isActive?' group-active':''),
        onClick:(e)=>{
          e.stopPropagation();
          UI.openDrop=isOpen?null:grp.id;
          render();
        },
      },[grp.i+' '+grp.l,h('span',{cls:'ndrop-chevron'},'▼')]),
      h('div',{cls:'ndrop-menu'},[
        ...grp.children.map(child=>h('button',{
          cls:'ndrop-item'+(UI.view===child.id?' on':''),
          onClick:(e)=>{e.stopPropagation();goTo(child.id);},
        },[child.i+' '+child.l])),
      ]),
    ]);
    return wrap;
  });

  // Mobile drawer — groups shown with a section label
  const mobileItems=[];
  NAV_GROUPS.forEach(grp=>{
    if(!grp.children){
      mobileItems.push(h('button',{cls:'mob-nb'+(UI.view===grp.id?' on':''),onClick:()=>goTo(grp.id)},[grp.i,' ',grp.l]));
    } else {
      mobileItems.push(h('div',{cls:'mob-section'},[grp.i+' '+grp.l]));
      grp.children.forEach(child=>{
        mobileItems.push(h('button',{
          cls:'mob-nb'+(UI.view===child.id?' on':''),
          style:{paddingLeft:'28px'},
          onClick:()=>goTo(child.id),
        },[child.i,' ',child.l]));
      });
    }
  });

  const drawer=h('div',{cls:'mob-drawer'+(open?' open':'')},[
    h('div',{style:{padding:'8px 16px 4px'}},[
      h('div',{style:{fontSize:'11px',color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.08em'}},'Promotion'),
      h('div',{style:{fontWeight:'900',fontSize:'16px',marginTop:'2px'}},[p.name]),
      h('div',{cls:'mob-cash'},[fm(fn.cash)]),
      h('div',{style:{fontSize:'12px',color:'var(--tx3)',paddingLeft:'16px',marginTop:'-6px',paddingBottom:'8px'}},'Wk '+G.wk+' · '+MON[G.mo-1]+' '+G.yr),
    ]),
    h('div',{cls:'mob-div'}),
    ...mobileItems,
    h('div',{cls:'mob-div'}),
    h('button',{cls:'mob-adv',onClick:()=>{advWeek();UI.mobileNav=false;}},'⏩ Advance Week'),
  ]);

  const nav=h('div',{cls:'nav'},[
    h('button',{cls:'hambtn',onClick:()=>{UI.mobileNav=!open;render();}},open?'✕':'☰'),
    h('div',{style:{display:'flex',alignItems:'center',gap:'6px',cursor:'pointer',flex:'0 0 auto'},onClick:()=>goTo('dash')},[
      h('div',{style:{background:'linear-gradient(135deg,#c0392b,#8e1c14)',borderRadius:'6px',padding:'4px 8px',display:'flex',alignItems:'center',gap:'4px'}},[
        h('span',{style:{fontSize:'13px',fontWeight:'900',color:'#fff',letterSpacing:'-0.5px'}},[h('span',{style:{color:'#f39c12'}},'MMA'),' MOGUL']),
      ]),
      h('div',{style:{display:'flex',alignItems:'center',gap:'6px'}},[
        h('div',{style:{fontSize:'12px',color:'var(--tx2)',fontWeight:'600'}},[p.sn]),
        h('div',{style:{background:'rgba(243,156,18,.18)',border:'1px solid rgba(243,156,18,.5)',borderRadius:'5px',padding:'2px 8px',fontSize:'12px',fontWeight:'900',color:'#f39c12',letterSpacing:'0.03em'}},['Wk'+G.wk+' · '+MON[G.mo-1]+' '+G.yr]),
      ]),
    ]),
    h('div',{cls:'nlinks'},[...desktopItems]),
    h('div',{cls:'nright'},[
      h('div',{cls:'ncash'+(fn.cash<2e6?' lo':'')},[fm(fn.cash)]),
      h('button',{cls:'advbtn',onClick:advWeek},['⏩ Advance Week']),
    ]),
  ]);

  // Close dropdown on outside click
  const wrap=document.createElement('div');
  wrap.appendChild(nav);
  wrap.appendChild(drawer);

  // Attach a one-time outside-click listener to close open dropdowns
  if(UI.openDrop){
    setTimeout(()=>{
      const handler=()=>{UI.openDrop=null;render();document.removeEventListener('click',handler);};
      document.addEventListener('click',handler);
    },0);
  }

  return wrap;
}

function render(){
  const root=document.getElementById('root');
  while(root.firstChild)root.removeChild(root.firstChild);
  document.body.classList.toggle('dark',UI.dark);

  if(!G){root.appendChild(vSelect());return;}

  root.appendChild(vNav());
  const pg=UI.view==='dash'?vDash():UI.view==='roster'?vRoster():UI.view==='fa'?vFA():UI.view==='events'?vEvents():UI.view==='finance'?vFinance():UI.view==='compare'?vCompare():UI.view==='infra'?vInfra():UI.view==='sponsors'?vSponsors():UI.view==='regions'?vRegions():UI.view==='changelog'?vChangelog():UI.view==='goat'?vGoat():UI.view==='hof'?vHof():UI.view==='prospects'?vProspects():UI.view==='legacy'?vLegacy():vDash();
  root.appendChild(pg);
  pg.appendChild(vFooter());

  const modal=vModal();if(modal)root.appendChild(modal);
  const settings=vSettings();if(settings)root.appendChild(settings);
}

render();

// Browser back/forward — navigate within game instead of leaving
history.pushState(null,'',location.href);
window.addEventListener('popstate',()=>{
  history.pushState(null,'',location.href); // always re-push so we stay on page
  if(UI.modal){UI.modal=null;render();return;}
  if(UI.evB){UI.evB=null;render();return;}
  if(UI.fDetail){UI.fDetail=null;UI.view='roster';render();return;}
  if(UI.openDrop){UI.openDrop=null;render();return;}
  if(UI.view&&UI.view!=='dash'){UI.view='dash';render();return;}
});
</script></body></html>
