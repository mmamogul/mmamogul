<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MMA Mogul v19</title>
<style>
/* ── Select Screen ───────────────────────────────── */
.sel-wrap::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(0,0,0,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.04) 1px,transparent 1px);
  background-size:48px 48px;}

:root{--bg:#f4f4f2;--bg2:#fff;--bg3:#ededeb;--bd:#e0e0dd;--tx:#1a1a1a;--tx2:#666;--tx3:#aaa;--red:#c0392b;--grn:#27ae60;--gold:#b8860b;--blu:#2980b9;--sh:rgba(0,0,0,.07)}
.dark{--bg:#0d0d0d;--bg2:#161616;--bg3:#1e1e1e;--bd:#282828;--tx:#f0f0f0;--tx2:#999;--tx3:#555;--sh:rgba(0,0,0,.4)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:system-ui,sans-serif;font-size:14px;transition:background .2s,color .2s}
button,input,select{font-family:inherit}
input,select{background:var(--bg3);border:1px solid var(--bd);border-radius:6px;color:var(--tx);padding:6px 10px;font-size:13px;outline:none}
input:focus,select:focus{border-color:var(--red)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
.nav{position:fixed;top:0;left:0;right:0;height:56px;background:var(--bg2);border-bottom:2px solid var(--red);display:flex;align-items:center;padding:0 16px;gap:8px;z-index:100;box-shadow:0 2px 8px var(--sh)}
.nlogo{font-size:15px;font-weight:900;color:var(--red);margin-right:4px;white-space:nowrap}
.ntag{font-size:11px;color:var(--tx3);background:var(--bg3);border-radius:4px;padding:2px 6px;white-space:nowrap}
.nlinks{display:flex;gap:2px;flex:1;flex-wrap:nowrap;justify-content:flex-start}
.nb{background:none;border:none;border-radius:6px;color:var(--tx2);font-size:13px;font-weight:500;padding:7px 12px;cursor:pointer;white-space:nowrap}
.nb:hover{background:var(--bg3)}
.nb.on{background:var(--red);color:#fff;font-weight:700}
.nright{display:flex;align-items:center;gap:7px;flex-shrink:0}
.ncash{font-size:13px;font-weight:800;color:var(--grn);white-space:nowrap}
.ncash.lo{color:var(--red)}
.advbtn{background:var(--red);border:none;border-radius:6px;color:#fff;font-size:13px;font-weight:700;padding:7px 14px;cursor:pointer;white-space:nowrap}
.setbtn{background:var(--bg3);border:1px solid var(--bd);border-radius:6px;color:var(--tx2);font-size:14px;padding:4px 8px;cursor:pointer}
.page{margin-top:56px;padding:18px;min-height:calc(100vh - 56px)}
.ptitle{font-size:20px;font-weight:900;margin-bottom:3px}
.psub{font-size:13px;color:var(--tx2);margin-bottom:16px}
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:14px;box-shadow:0 2px 6px var(--sh);margin-bottom:12px}
.ct{font-size:10px;font-weight:700;color:var(--tx3);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.bw{margin-bottom:4px}
.br{display:flex;justify-content:space-between;font-size:11px;color:var(--tx2);margin-bottom:2px}
.bt{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.bf{height:100%;border-radius:3px}
.kpi{background:var(--bg3);border-radius:7px;padding:9px;text-align:center}
.kpi-l{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.kpi-v{font-size:18px;font-weight:900}
.tag{display:inline-block;border-radius:4px;padding:2px 6px;font-size:10px;font-weight:700;margin-right:3px}
.tc{background:#fef3cd;color:#7d6008;border:1px solid #f5c518}
.te{background:#cce5ff;color:#003d80;border:1px solid #9dc3ff}
.tk{background:#d4edda;color:#155724;border:1px solid #a8d5b5}
.tp{background:var(--bg3);color:var(--tx2);border:1px solid var(--bd)}
.ti{background:#f8d7da;color:#721c24;border:1px solid #f5c6cb}
.tx2{background:#fff3cd;color:#856404;border:1px solid #ffc107}
.dark .tc{background:#3d3000;color:#ffd700;border-color:#6d5200}
.dark .te{background:#002244;color:#7ab8ff;border-color:#004488}
.dark .tk{background:#002200;color:#5cb85c;border-color:#004400}
.dark .ti{background:#3d0008;color:#f5a0a8;border-color:#6d0010}
.dark .tx2{background:#3d2e00;color:#ffc107;border-color:#6d5200}
.btn{border:none;border-radius:6px;font-weight:700;font-size:13px;padding:7px 13px;cursor:pointer;transition:opacity .15s}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-r{background:var(--red);color:#fff}
.btn-r:hover:not(:disabled){opacity:.85}
.btn-s{background:var(--bg3);color:var(--tx);border:1px solid var(--bd)}
.btn-s:hover:not(:disabled){border-color:var(--red);color:var(--red)}
.btn-g{background:var(--grn);color:#fff}
.btn-g:hover:not(:disabled){opacity:.85}
.btn-sm{font-size:11px;padding:4px 8px;border-radius:5px}
.btn-fw{width:100%;text-align:center;display:block}
.fg{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:11px}
.fc{background:var(--bg2);border:1px solid var(--bd);border-radius:9px;padding:12px;cursor:pointer;transition:all .15s}
.fc:hover{border-color:var(--red);box-shadow:0 4px 12px var(--sh);transform:translateY(-1px)}
.ovb{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;flex-shrink:0}
.rt{width:100%;border-collapse:collapse}
.rt th{text-align:left;font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;padding:5px 8px;border-bottom:1px solid var(--bd)}
.rt td{padding:6px 8px;border-bottom:1px solid var(--bd);font-size:13px}
.rt tr:hover td{background:var(--bg3)}
.rt .cr td{background:rgba(192,57,43,.04)}
.tabs{display:flex;border-bottom:1px solid var(--bd);margin-bottom:16px}
.tab{background:none;border:none;border-bottom:2px solid transparent;color:var(--tx2);font-size:13px;font-weight:600;padding:8px 13px;cursor:pointer;margin-bottom:-1px}
.tab:hover{color:var(--tx)}
.tab.on{color:var(--red);border-bottom-color:var(--red)}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.chip{background:var(--bg3);border:1px solid var(--bd);border-radius:20px;color:var(--tx2);font-size:12px;font-weight:600;padding:3px 10px;cursor:pointer}
.chip:hover{border-color:var(--red);color:var(--red)}
.chip.on{background:var(--red);border-color:var(--red);color:#fff}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.md{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;max-width:550px;width:100%;max-height:85vh;overflow-y:auto;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.al{padding:9px 12px;border-radius:7px;font-size:13px;margin-bottom:8px}
.al-w{background:#fff3cd;color:#856404;border:1px solid #ffc107}
.al-d{background:#f8d7da;color:#721c24;border:1px solid #f5c6cb}
.dark .al-w{background:#3d2e00;color:#ffc107;border-color:#5a4400}
.dark .al-d{background:#3d0008;color:#f5a0a8;border-color:#5a0010}
.le{font-size:12px;color:var(--tx2);padding:4px 0;border-bottom:1px solid var(--bd);line-height:1.4}
.le:first-child{color:var(--tx);font-weight:600}
.mr{display:flex;align-items:center;gap:7px;background:var(--bg3);border-radius:7px;padding:8px;margin-bottom:5px}
.mvs{font-weight:900;color:var(--red);font-size:13px;flex-shrink:0}
.mf{flex:1;min-width:0}
.wcc{background:var(--bg3);border:1px solid var(--bd);border-radius:7px;padding:7px;cursor:pointer;font-size:12px;font-weight:600;text-align:center}
.wcc:hover,.wcc.on{background:var(--red);border-color:var(--red);color:#fff}
.ol{max-height:270px;overflow-y:auto}
.or{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:7px;cursor:pointer;border:1px solid transparent;margin-bottom:2px}
.or:hover{background:var(--bg3)}
.or.on{background:rgba(192,57,43,.08);border-color:var(--red)}
.tier-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.tc-card{background:var(--bg3);border:2px solid var(--bd);border-radius:9px;padding:10px;cursor:pointer;text-align:center}
.tc-card:hover,.tc-card.on{border-color:var(--red);background:rgba(192,57,43,.05)}
.sp{position:fixed;top:56px;right:0;width:240px;height:calc(100vh - 50px);background:var(--bg2);border-left:1px solid var(--bd);padding:16px;z-index:99;box-shadow:-4px 0 16px var(--sh)}
.sp-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bd)}
.tog{width:36px;height:20px;background:var(--bg3);border-radius:10px;border:1px solid var(--bd);cursor:pointer;position:relative;transition:background .2s}
.tog.on{background:var(--red);border-color:var(--red)}
.tog::after{content:'';position:absolute;left:2px;top:2px;width:14px;height:14px;background:#fff;border-radius:50%;transition:left .15s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.tog.on::after{left:18px}

/* ── BUILD 1 ADDITIONS ───────────────────────────────────── */
/* Morale badge */
.morale-hi{color:#27ae60;font-weight:800}
.morale-ok{color:#e67e22;font-weight:800}
.morale-lo{color:#c0392b;font-weight:800}
/* Negotiation modal */
.neg-offer{background:var(--bg3);border:2px solid var(--bd);border-radius:9px;padding:12px;cursor:pointer;transition:all .15s;margin-bottom:6px}
.neg-offer:hover{border-color:var(--red)}
.neg-offer.selected{border-color:var(--grn);background:rgba(39,174,96,.07)}
/* Contender badge */
.tag-cnd{background:#fff0e6;color:#b8500a;border:1px solid #f5a05c}
.dark .tag-cnd{background:#3d1800;color:#f5a05c;border-color:#6d2e00}
/* Weight class move */
.wc-move-row{display:flex;align-items:center;gap:8px;padding:8px;border-radius:8px;border:1px solid var(--bd);margin-bottom:5px;cursor:pointer;transition:background .12s}
.wc-move-row:hover{background:var(--bg3)}
/* Demand alert */
.demand-card{border-left:3px solid var(--red);padding:10px 12px;background:rgba(192,57,43,.05);border-radius:0 8px 8px 0;margin-bottom:8px}

/* ── LEGACY SYSTEMS (v18) ─────────────────────────────────── */
/* GOAT tier badge colors */
.lt-local{background:#f0f0f0;color:#666;border:1px solid #ddd}
.lt-contender{background:#e8f4fc;color:#2471a3;border:1px solid #aed6f1}
.lt-champion{background:#fef9e7;color:#b7950b;border:1px solid #f9e79f}
.lt-legend{background:#fdf2f8;color:#884ea0;border:1px solid #d7bde2}
.lt-great{background:#eafaf1;color:#1e8449;border:1px solid #a9dfbf}
.lt-goatc{background:#fef5e7;color:#d35400;border:1px solid #f0b27a}
.lt-goat{background:linear-gradient(135deg,#ffd700,#ff8c00);color:#fff;border:none;font-weight:900;box-shadow:0 1px 4px rgba(255,140,0,.4)}
.dark .lt-local{background:#2a2a2a;color:#888;border-color:#333}
.dark .lt-contender{background:#0d2137;color:#5dade2;border-color:#1a4a6e}
.dark .lt-champion{background:#2d2500;color:#f1c40f;border-color:#6d5a00}
.dark .lt-legend{background:#2d1b3d;color:#c39bd3;border-color:#5b2c6f}
.dark .lt-great{background:#0d2b1a;color:#58d68d;border-color:#1e6b3c}
.dark .lt-goatc{background:#3d1f00;color:#f0b27a;border-color:#7e4000}
/* GOAT leaderboard */
.goat-row{display:grid;grid-template-columns:36px 1fr auto auto auto;align-items:center;gap:8px;padding:9px 10px;border-radius:8px;margin-bottom:3px;cursor:pointer;transition:background .12s}
.goat-row:hover{background:var(--bg3)}
.goat-rank{font-size:13px;font-weight:900;text-align:center;color:var(--tx3)}
.goat-rank.gold{color:#d4ac0d;font-size:15px}
.goat-rank.silver{color:#909090;font-size:14px}
.goat-rank.bronze{color:#c47a3a;font-size:14px}
/* HoF */
.hof-card{background:linear-gradient(135deg,rgba(212,172,13,.08),rgba(212,172,13,.02));border:1.5px solid rgba(212,172,13,.3);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.hof-name{font-size:15px;font-weight:900;color:var(--tx)}
/* Era */
.era-pill{background:var(--bg3);border:1px solid var(--bd);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;display:inline-block}
/* Career timeline */
.timeline-dot{width:10px;height:10px;border-radius:50%;background:var(--red);flex-shrink:0;margin-top:4px}
.timeline-line{width:1px;background:var(--bd);flex:1;min-height:16px;margin-left:4px}
/* Milestone badge */
.milestone-badge{background:var(--bg3);border:1px solid var(--bd);border-radius:8px;padding:6px 10px;font-size:11px;display:flex;align-items:center;gap:6px}
.milestone-badge.achieved{border-color:var(--gold);background:rgba(212,172,13,.07)}
/* Narrative */
.narrative-card{background:var(--bg2);border-left:3px solid var(--red);padding:12px 16px;border-radius:0 10px 10px 0;margin-bottom:10px;font-size:13px;line-height:1.65;color:var(--tx)}
.narrative-hl{font-weight:800;color:var(--tx)}
/* Prospect score bar */
.prospect-bar{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:4px}
.prospect-fill{height:100%;border-radius:2px}

/* ── NAV DROPDOWNS ───────────────────────────────────────── */
.ndrop{position:relative;display:inline-flex;}
.ndrop-menu{display:none;position:absolute;top:calc(100% + 6px);left:0;background:var(--bg2);border:1px solid var(--bd);border-radius:9px;box-shadow:0 8px 24px var(--sh);padding:5px;min-width:170px;z-index:200;}
.ndrop.open .ndrop-menu{display:block;}
.ndrop-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:6px;font-size:13px;font-weight:500;color:var(--tx2);cursor:pointer;white-space:nowrap;border:none;background:none;width:100%;text-align:left;font-family:inherit;}
.ndrop-item:hover,.ndrop-item.on{background:var(--bg3);color:var(--tx);}
.ndrop-item.on{font-weight:700;color:var(--red);}
.ndrop-trigger{background:none;border:none;border-radius:6px;color:var(--tx2);font-size:13px;font-weight:500;padding:7px 10px;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:4px;font-family:inherit;}
.ndrop-trigger:hover{background:var(--bg3);}
.ndrop-trigger.group-active{color:var(--red);font-weight:700;background:rgba(192,57,43,.07);}
.ndrop-chevron{font-size:9px;opacity:.5;transition:transform .15s;line-height:1;}
.ndrop.open .ndrop-chevron{transform:rotate(180deg);}
.mob-section{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.1em;padding:10px 16px 2px;}

.game-footer{padding:20px 18px 28px;border-top:1px solid var(--bd);margin-top:8px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.game-footer-left{font-size:11px;color:var(--tx3);}
.game-footer-right{display:flex;gap:14px;align-items:center;}
.footer-link{background:none;border:none;font-size:11px;color:var(--blu);cursor:pointer;padding:0;text-decoration:underline;font-family:inherit;}
.footer-link:hover{color:var(--red);}

/* ── MOBILE NAV ─────────────────────────────────────── */
.hambtn{display:none;background:none;border:none;color:var(--tx);font-size:22px;cursor:pointer;padding:4px 8px;line-height:1;flex-shrink:0;}
.mob-drawer{position:fixed;top:56px;left:0;right:0;bottom:0;background:var(--bg2);z-index:999;flex-direction:column;padding:12px;gap:4px;overflow-y:auto;border-top:2px solid var(--red);display:none;}
.mob-drawer.open{display:flex;}
.mob-nb{background:none;border:none;border-radius:8px;color:var(--tx);font-size:15px;padding:13px 16px;cursor:pointer;text-align:left;width:100%;font-weight:600;display:flex;align-items:center;gap:10px;}
.mob-nb:hover,.mob-nb.on{background:var(--bg3);color:var(--red);}
.mob-nb.on{font-weight:800;}
.mob-div{height:1px;background:var(--bd);margin:6px 0;}
.mob-cash{font-size:20px;font-weight:900;color:var(--grn);padding:10px 16px;}
.mob-adv{width:100%;padding:14px;font-size:15px;font-weight:800;background:var(--red);color:#fff;border:none;border-radius:10px;cursor:pointer;margin-top:4px;}
@media(max-width:768px){
  .hambtn{display:flex;align-items:center;}
  .nlinks{display:none!important;}
  .nright{display:none!important;}
  .ntag{display:none!important;}
  nav{padding:0 10px 0 8px;}
  .page{padding:12px 10px;}
  .g2{grid-template-columns:1fr!important;}
  .g4{grid-template-columns:1fr 1fr!important;}
  .card{padding:12px!important;}
  .fg{grid-template-columns:1fr!important;}
  .md{max-width:100%!important;margin:8px!important;}
}
@media(max-width:480px){
  .g4{grid-template-columns:1fr 1fr!important;}
}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ========================================================
// MMA MOGUL - Fight Empire Simulator

// -- CONSTANTS --------------------------------------------
const WCN={straw:'Strawweight',fly:'Flyweight',bantam:'Bantamweight',feather:'Featherweight',light:'Lightweight',welter:'Welterweight',middle:'Middleweight',lheavy:'Light Heavyweight',heavy:'Heavyweight'};

const SAVE_KEY='mmaempire2026_save';
const SAVE_VER=6;

function saveGame(){
  try{
    const data={ver:SAVE_VER,ts:Date.now(),G:JSON.parse(JSON.stringify(G)),UI:{
      view:UI.view,dark:UI.dark,
    }};
    localStorage.setItem(SAVE_KEY,JSON.stringify(data));
    return true;
  }catch(e){console.warn('Save failed:',e);return false;}
}

function loadGame(){
  try{
    const raw=localStorage.getItem(SAVE_KEY);
    if(!raw)return null;
    const data=JSON.parse(raw);
    if(!data||data.ver!==SAVE_VER)return null;
    return data;
  }catch(e){return null;}
}

function deleteSave(){
  localStorage.removeItem(SAVE_KEY);
}

function hasSave(){
  return !!localStorage.getItem(SAVE_KEY);
}

function getSaveMeta(){
  try{
    const raw=localStorage.getItem(SAVE_KEY);
    if(!raw)return null;
    const d=JSON.parse(raw);
    const ts=new Date(d.ts);
    const g=d.G;
    return{
      promo:g?.promo?.name||'Unknown',
      week:'Wk'+g?.wk+' '+['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][(g?.mo||1)-1]+' '+g?.yr,
      cash:g?.fin?.cash||0,
      ts:ts.toLocaleString(),
    };
  }catch(e){return null;}
}

// -- ENGINE ------------------------------------------------
let _id=1000;
function uid(){return _id++;}
function ov(f){if(!f||!f.s)return 0;return Math.round((f.s.str+f.s.grp+f.s.wre+f.s.chi+f.s.car+f.s.iq)/6);}
function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function sc(v){return v>=80?'#27ae60':v>=65?'#e67e22':'#c0392b';}
function fm(n){
  if(n===null||n===undefined||isNaN(n))return '$0';
  const abs=Math.abs(n);
  const sign=n<0?'-':'';
  if(abs>=1e6)return sign+'$'+(abs/1e6).toFixed(2)+'M';
  if(abs>=1e3)return sign+'$'+(abs/1e3).toFixed(0)+'K';
  return sign+'$'+Math.round(abs);
}
function fs(n){
  if(!n||isNaN(n))return '$0';
  const abs=Math.abs(n);
  const sign=n<0?'-':'';
  if(abs>=1e6)return sign+'$'+(abs/1e6).toFixed(1)+'M';
  return sign+'$'+(abs/1e3).toFixed(0)+'K';
}
function pct(n,total){return total>0?Math.round((n/total)*100):0;}

// Contract tiers: {fights, show, win} per fight (based on real 2025/26 data)
// show money / win bonus — regional prospects get $12K/$12K, stars get $500K+/$500K+
const CT={
  champion:{fights:6,show:600000,win:600000,ppv:400000},
  elite:{fights:6,show:150000,win:150000,ppv:0},
  contender:{fights:6,show:50000,win:45000,ppv:0},
  prospect:{fights:4,show:14000,win:14000,ppv:0},
};
function makeContract(tier,mkt,cha){
  const t=CT[tier]||CT.prospect;
  const starAvg=mkt&&cha?(mkt+cha)/2:60;
  // Star multiplier — exponential curve. Avg 98 (McGregor) ≈ 12x base
  // Avg 90 ≈ 6x, Avg 80 ≈ 3x, Avg 70 ≈ 1.6x, below 65 = 1x
  const starMult=starAvg<65?1:1+Math.pow((starAvg-65)/35,1.6)*11;
  const jitter=0.88+Math.random()*0.24;
  const sh=Math.round(t.show*starMult*jitter/1000)*1000;
  const wn=Math.round(t.win*starMult*jitter/1000)*1000;
  return{fights:t.fights,show:sh,win:wn,fightsLeft:t.fights,ppv:t.ppv||0};
}
function ctLabel(ct){
  if(!ct)return'No Contract';
  const s=ct.show>=1e6?'$'+(ct.show/1e6).toFixed(1)+'M':'$'+Math.round(ct.show/1000)+'K';
  const w=ct.win>=1e6?'$'+(ct.win/1e6).toFixed(1)+'M':'$'+Math.round(ct.win/1000)+'K';
  return ct.fightsLeft+'/'+ct.fights+' fights — '+s+' Show / '+w+' Win'+(ct.ppv?' + PPV':'');
}
function ctValue(c){if(!c)return 0;return(c.show+c.win)*(c.fightsLeft/Math.max(1,c.fights));}
function pf(raw,pid){
  const tier=raw.tier||'prospect';
  const ct=makeContract(tier, raw.s?.mkt, raw.s?.cha);
  const baseRankPts={champion:1000,elite:700,contender:450,prospect:200}[tier]||300;
  return{
    id:uid(),name:raw.n,age:raw.age,rec:{...raw.rec},tier:raw.tier,
    isChamp:raw.ch||false,nat:raw.nat,
    weightClass:raw.wc||raw.wc_override||null,
    s:{...raw.s},
    promo:pid,
    contract:ct,
    salary:(ct.show+ct.win),
    status:'active',
    injuryWeeksLeft:0,
    potential:raw.pot||null,
    isProspect:raw.pot?true:false,
    hidden:{inj:Math.random(),con:Math.random()*0.25},
    rankPts:raw.ch?1000:baseRankPts+Math.round((Math.random()-0.5)*80),
    rankPrev:null, // previous rank position (for movement arrows)
    morale:raw.ch?85:({elite:75,contender:65,prospect:60}[raw.tier]||65)+ri(-5,5),
    titleStripWarned:false,
  };
}

function buildRoster(pid){
  const out=[];
  const raw=R[pid]||{};
  Object.entries(raw).forEach(([wc,arr])=>{
    if(!Array.isArray(arr))return;
    arr.forEach(f=>{const p=pf(f,pid);p.weightClass=wc;out.push(p);});
  });
  return out;
}

function sim(f1,f2){
  const s1=(f1.s.str+f1.s.grp+f1.s.wre+f1.s.chi+f1.s.car+f1.s.iq)/6;
  const s2=(f2.s.str+f2.s.grp+f2.s.wre+f2.s.chi+f2.s.car+f2.s.iq)/6;
  const gap=Math.abs(s1-s2);
  const noiseRange=Math.max(30,50-gap*0.5);
  const noise=(Math.random()-.5)*noiseRange;
  const win=(s1+noise)>s2?f1:f2;
  const lose=win===f1?f2:f1;
  const rv=Math.random();
  const method=rv<.28?'KO/TKO':rv<.44?'Submission':rv<.76?'Unanimous Decision':rv<.89?'Split Decision':'Majority Decision';
  const round=method.includes('Decision')?3:ri(1,3);
  const moraleBoost=((f1.morale||70)+(f2.morale||70))/2;
  const ent=Math.min(100,Math.max(15,Math.round(
    (f1.s.cha+f2.s.cha)/2*.35+(Math.abs(s1-s2)<5?18:0)+(method==='KO/TKO'||method==='Submission'?16:0)+ri(-10,18)+(moraleBoost>75?3:moraleBoost<45?-5:0))));
  return{wId:win.id,lId:lose.id,wName:win.name,lName:lose.name,f1Id:f1.id,method,round,ent,wOvr:Math.round(s1>s2?s1:s2),lOvr:Math.round(s1>s2?s2:s1)};
}

// Map each location ID to its region
const LOC_TO_REGION={};
Object.entries(REGION_DEFS).forEach(([rid,r])=>r.locations.forEach(lid=>{LOC_TO_REGION[lid]=rid;}));

// Get the effective travel cost for a location given current regional presence
function getEffectiveTravelCost(locationId){
  const loc=EVENT_LOCATIONS.find(l=>l.id===locationId)||{};
  const rid=LOC_TO_REGION[locationId];
  if(!rid)return loc.travelCost||0;
  const rDef=REGION_DEFS[rid];
  const level=(G?.regionalPresence||{})[rid]||0;
  const discount=level*rDef.perLevelBonus.travelDiscount;
  const base=loc.travelCost||0;
  return Math.round(base*(1-Math.min(0.9,discount)));
}

// Get fill rate boost from regional presence
function getRegionalFillBoost(locationId){
  const rid=LOC_TO_REGION[locationId];
  if(!rid||!G)return 0;
  const rDef=REGION_DEFS[rid];
  const level=(G.regionalPresence||{})[rid]||0;
  return level*rDef.perLevelBonus.fillBoost;
}

// Get prestige bonus from regional presence (stacks with location presBonus)
function getRegionalPresBoost(locationId){
  const rid=LOC_TO_REGION[locationId];
  if(!rid||!G)return 0;
  const rDef=REGION_DEFS[rid];
  const level=(G.regionalPresence||{})[rid]||0;
  return level*rDef.perLevelBonus.presBonus;
}

// Check if a fighter is a "home market" fighter for a given location
function isFighterHomeMarket(fighter, locationId){
  const rid=LOC_TO_REGION[locationId]||'';
  const rDef=REGION_DEFS[rid];
  if(!rDef||!fighter.nat)return false;
  return rDef.natKeywords.some(kw=>fighter.nat.includes(kw));
}

// Count home market fighters on a card
function countHomeMarketFighters(eventFights, locationId){
  if(!eventFights||!G)return 0;
  let count=0;
  eventFights.forEach(fi=>{
    const f1=G.roster.find(f=>f.id===fi.f1Id);
    const f2=G.roster.find(f=>f.id===fi.f2Id);
    if(f1&&isFighterHomeMarket(f1,locationId))count++;
    if(f2&&isFighterHomeMarket(f2,locationId))count++;
  });
  return count;
}

// Invest in a region (level it up)
function investRegion(rid){
  if(!G)return;
  G.regionalPresence=G.regionalPresence||{};
  const curLevel=(G.regionalPresence[rid]||0);
  const rDef=REGION_DEFS[rid];
  if(!rDef)return;
  if(curLevel>=3){alert('Max regional presence already reached!');return;}
  const cost=rDef.investCost[curLevel+1];
  if(G.fin.cash<cost){alert('Need '+fm(cost)+' to expand into '+rDef.name+'!');return;}
  G.fin.cash-=cost;
  G.regionalPresence[rid]=curLevel+1;
  const levelNames=['','Foothold','Established','Dominant'];
  G.log.push('🌍 Expanded into '+rDef.name+' — '+levelNames[curLevel+1]+' presence achieved! Travel costs -'+(Math.round(rDef.perLevelBonus.travelDiscount*(curLevel+1)*100))+'%, Fill +'+Math.round(rDef.perLevelBonus.fillBoost*(curLevel+1)*100)+'%');
  render();
}

function showToast(msg, col){
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;top:20px;right:20px;z-index:99999;background:'+(col||'#27ae60')+';color:#fff;padding:10px 18px;border-radius:8px;font-weight:700;font-size:13px;box-shadow:0 4px 16px rgba(0,0,0,.25);transform:translateX(120%);transition:transform .25s ease;max-width:280px;pointer-events:none;';
  document.body.appendChild(t);
  requestAnimationFrame(()=>{ t.style.transform='translateX(0)'; });

}


// -- RANKING UPDATE ----------------------------------------
function updateRankings(){
  const allWCs=[...WCO,...FWCO];
  allWCs.forEach(wc=>{
    const inDiv=G.roster.filter(f=>f.weightClass===wc);
    if(!inDiv.length)return;
    // Snapshot current rank before this week's update
    const sorted=[...inDiv].sort((a,b)=>(b.rankPts||0)-(a.rankPts||0));
    sorted.forEach((f,i)=>{f.rankPrev=i+1;});
    // Small decay for fighters who haven't competed recently
    inDiv.forEach(f=>{
      if(f.isChamp){f.rankPts=1000;return;}
      const wksSinceFight=f.lastFightYr
        ?Math.max(0,(G.yr-f.lastFightYr)*48+(G.mo-f.lastFightMo)*4+(G.wk-f.lastFightWk))
        :999;
      if(wksSinceFight>12)f.rankPts=Math.max(50,(f.rankPts||300)-2);
      f.rankPts=Math.min(999,Math.max(50,f.rankPts||300));
    });
  });
}

function advWeek(){
  G.wk++;
  if(G.wk>4){G.wk=1;G.mo++;}
  if(G.mo>12){G.mo=1;G.yr++;}

  if(G.wk===1){
    // Monthly finances
    // Fighter purses are ONLY paid at events (show+win) — no monthly fighter costs
    // Monthly fixed: media rights income, sponsor income, minus overhead and buildings
    const mi=(G.fin.mr?.mv||0)+Math.round(getSponsorIncome()/12);
    const bc=G.buildings.reduce((s,b)=>s+b.monthly,0);
    // TV clause: penalty if running way behind on event pace
    let tvPenalty=0;
    if(G.fin.mr?.clause){
      const cl=G.fin.mr.clause;
      const evThisYear=G.events.filter(e=>e.yr===G.yr).length;
      const mosSoFar=Math.max(1,G.mo);
      const reqByNow=Math.round(cl.evPerYr/12*mosSoFar);
      if(evThisYear<reqByNow*0.5)tvPenalty=cl.penalty;
    }
    const net=mi-G.promo.ovhd-bc-tvPenalty;
    G.fin.cash+=net;
    G.fin.tvTotal+=mi;
    if(tvPenalty>0)G.log.push('⚠ TV clause penalty: '+fm(tvPenalty)+' (running behind on event requirements)');
    G.roster.forEach(f=>{f.age+=1/12;});
    // Auto-save every week
    saveGame();

    // Building effects
    if(G.buildings.find(b=>b.id==='gym')){
      G.roster.forEach(f=>{
        if(Math.random()<.15){
          const stat=Object.keys(f.s)[ri(0,5)];
          f.s[stat]=Math.min(99,f.s[stat]+1);
        }
      });
    }
    if(G.buildings.find(b=>b.id==='academy')&&G.mo%3===1&&G.scoutPool.length>0){
      const idx=ri(0,G.scoutPool.length-1);
      const raw=G.scoutPool.splice(idx,1)[0];
      const newF={n:raw.n,age:raw.age,rec:{w:ri(2,6),l:ri(0,2)},tier:'prospect',nat:raw.nat,wc:raw.wc,
        s:{str:ri(50,65),grp:ri(50,65),wre:ri(50,65),chi:ri(60,75),car:ri(65,80),iq:ri(50,65),cha:ri(40,70),mkt:ri(40,70)},pot:raw.pot};
      const p=pf(newF,G.promo.id);
      p.weightClass=raw.wc;
      G.roster.push(p);
      G.log.push('🎓 Academy graduate: '+p.name+' ('+p.weightClass+') joined the roster!');
    }

    const prevMo=MON[G.mo-2<0?11:G.mo-2];
    G.log.push('📅 '+prevMo+' '+G.yr+': '+fm(mi)+' income | -'+fm(G.promo.ovhd+bc+tvPenalty)+' overhead | Net: '+fm(net));
    tickLegacyMonthly();
  }

  // Injury check
  if(Math.random()<.1){
    const act=G.roster.filter(f=>f.status==='active');
    if(act.length){
      const f=act[ri(0,act.length-1)];
      const injMod=G.buildings.find(b=>b.id==='medical')?0.5:1;
      if(f.hidden.inj>.6&&Math.random()<injMod){
        const weeks=ri(2,12);
        f.status='injured';f.injuryWeeksLeft=weeks;
        G.log.push('⚠ <fighter:'+f.name+'> injured - out ~'+weeks+' weeks');
      }
    }
  }
  // Heal injured
  G.roster.forEach(f=>{
    if(f.status==='injured'){
      f.injuryWeeksLeft=Math.max(0,f.injuryWeeksLeft-1);
      if(f.injuryWeeksLeft===0)f.status='active';
    }
  });

  // Rival activity
  G.rivals.forEach(rv=>{
    if(Math.random()<rv.aggr*.15&&G.fa.length){
      const idx=ri(0,G.fa.length-1);
      const sf=G.fa.splice(idx,1)[0];
      if(sf){sf.promo=rv.id;rv.roster.push(sf);G.log.push('📰 '+rv.name+' signed <fighter:'+sf.name+'>');}
    }
    if(Math.random()<.12){
      rv.eventsRun++;
      const baseRev=rv.prestige*ri(50,150)*1e3;
      rv.totalRevenue+=baseRev;
      rv.prestige=Math.min(100,Math.max(10,rv.prestige+(Math.random()>.5?.5:-.3)));
    }
  });

  // Auto-run any events scheduled for this week
  if(G.schedule&&G.schedule.length){
    const due=G.schedule.filter(ev=>ev.schedYr===G.yr&&ev.schedMo===G.mo&&ev.schedWk===G.wk);
    if(due.length>0){
      const ev=due[0];
      if(ev.fights&&ev.fights.length>=1){
        runEvent(ev);
        updateRankings();
        return;
      } else {
        UI.evB={...ev,scheduled:true,schedId:ev.id};
        render();
        return;
      }
    }
  }

  // Process pending scout jobs
  processScoutJobs();

  // Build 1 systems
  tickMorale();
  checkRetirements();
  checkTitleDefenses();

  updateRankings();
  render();
  const _mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  showToast('⏩ Week '+G.wk+' · '+(_mo[G.mo-1]||'')+' '+G.yr,'#2c3e50');
}

// -- SIGN/RELEASE -----------------------------------------
function signF(fid,fromScout=false){
  let f,idx;
  if(fromScout){
    idx=G.scouts.findIndex(s=>s.id===fid);
    if(idx<0)return;
    const raw=G.scouts[idx];
    const newF={n:raw.n,age:raw.age,rec:{w:ri(1,5),l:ri(0,2)},tier:'prospect',nat:raw.nat,wc:raw.wc,
      s:{str:ri(48,62),grp:ri(48,62),wre:ri(48,62),chi:ri(58,72),car:ri(60,76),iq:ri(48,62),cha:ri(38,65),mkt:ri(38,65)},pot:raw.pot};
    f=pf(newF,G.promo.id);
    f.weightClass=raw.wc;
    const fee=raw.signingCost;
    if(G.fin.cash<fee){alert('Need '+fs(fee)+' to sign this prospect!');return;}
    G.scouts.splice(idx,1);
    G.roster.push(f);
    G.fin.cash-=fee;
    G.log.push('🔭 Signed prospect <fighter:'+f.name+'> | Cost: '+fs(fee));
    UI.modal=null;render();return;
  }
  idx=G.fa.findIndex(f=>f.id===fid);
  if(idx<0)return;
  // Route through negotiation system
  openNegotiation(fid,false);
}

function releaseF(fid){
  const idx=G.roster.findIndex(f=>f.id===fid);
  if(idx<0)return;
  const f=G.roster.splice(idx,1)[0];
  f.promo=null;f.contract=null;G.fa.push(f);
  if(f.isChamp){G.promo.legit=Math.max(0,G.promo.legit-8);G.log.push('⚠ Released champ <fighter:'+f.name+'>! Legit -8');}
  else G.log.push('Released <fighter:'+f.name+'>');
  UI.fDetail=null;render();
}

// -- RUN EVENT --------------------------------------------
function runEvent(ev){
  const venue=VENUES.find(v=>v.id===ev.venueId)||VENUES[0];
  const selVenue=venue;
  const evLoc=EVENT_LOCATIONS.find(l=>l.id===ev.locationId)||EVENT_LOCATIONS[0];
  const locPopMult=evLoc.pop||1;
  const locPresBns=((evLoc.presBonus||{})[G.promo.id]||0)+getRegionalPresBoost(evLoc.id);
  // Home market fighter boost: each home market fighter on the card adds 3% fill bonus, capped at 20%
  const hmCount=countHomeMarketFighters(ev.fights,evLoc.id);
  const hmFillBoost=Math.min(0.20,hmCount*0.03);
  if(hmCount>0)G.log.push('🏠 '+hmCount+' home market fighter'+(hmCount>1?'s':'')+' on card — crowd boost +'+Math.round(hmFillBoost*100)+'%');
  const results=[];let totEnt=0;
  // Bonus pool - configurable per promotion
  const bonusAmt=G.promo.bonusAmt||{weekly:10000,fightnight:30000,premium:75000,supercard:100000}[ev.tier]||50000;
  let totalPurses=0;
  let kotdWinner=null,fotd={ent:-1,r:null},potdWinner=null;

  ev.fights.forEach(fi=>{
    const f1=G.roster.find(f=>f.id===fi.f1Id),f2=G.roster.find(f=>f.id===fi.f2Id);
    if(!f1||!f2)return;
    const res=sim(f1,f2);totEnt+=res.ent;
    const win=G.roster.find(f=>f.id===res.wId);
    const lose=G.roster.find(f=>f.id===res.lId);
    // Pay purses from event revenue
    const showW=win?.contract?.show||0, winW=win?.contract?.win||0;
    const showL=lose?.contract?.show||0;
    const fightPurse=showW+winW+showL;
    totalPurses+=fightPurse;
    if(win){win.rec.w++;if(win.contract)win.contract.fightsLeft=Math.max(0,win.contract.fightsLeft-1);win.lastFightWk=G.wk;win.lastFightMo=G.mo;win.lastFightYr=G.yr;if(win.morale!==undefined)win.morale=Math.min(100,win.morale+8);}
    if(lose){lose.rec.l++;if(lose.contract)lose.contract.fightsLeft=Math.max(0,lose.contract.fightsLeft-1);lose.lastFightWk=G.wk;lose.lastFightMo=G.mo;lose.lastFightYr=G.yr;if(lose.morale!==undefined)lose.morale=Math.max(0,lose.morale-5);
      // KO/TKO medical suspension: ~13 weeks (90 days)
      if(res.method==='KO/TKO'){lose.status='injured';lose.injuryWeeksLeft=13;G.log.push('🏥 <fighter:'+lose.name+'> on 90-day medical suspension after KO');}
    }
    if(fi.title&&lose?.isChamp){
      lose.isChamp=false;lose.tier='elite';
      if(win){win.isChamp=true;win.tier='champion';
        G.log.push('🏆 NEW CHAMP: <fighter:'+win.name+'> wins '+(ALL_WCN[fi.wc]||fi.wc)+' title by '+res.method+'!');
      }
    }
    // Track bonus candidates
    if((res.method==='KO/TKO'||res.method==='Submission')&&win&&(!kotdWinner))kotdWinner=win;
    if(res.ent>fotd.ent){fotd={ent:res.ent,r:res,f1,f2};}
    if(!potdWinner&&win&&res.ent>78)potdWinner=win;

    // Update ranking points - Elo-style within weight class
    if(win&&lose){
      const winPts=win.rankPts||500, losePts=lose.rankPts||500;
      const rankGap=Math.max(50, losePts-winPts);
      const baseXfer=fi.title?120:Math.min(80, Math.max(20, 40+(rankGap*0.25)));
      const methodBonus=res.method==='KO/TKO'?1.3:res.method==='Submission'?1.2:1.0;
      const xfer=Math.round(baseXfer*methodBonus);
      win.rankPts=Math.min(999,Math.max(50,(win.rankPts||500)+xfer));
      // Losers drop much less — cap loss at 40pts so one upset loss doesn't crater rankings
      const maxDrop=fi.title?60:Math.min(40, Math.round(xfer*0.35));
      lose.rankPts=Math.max(50,Math.min(999,(lose.rankPts||500)-maxDrop));
      if(win.isChamp)win.rankPts=1000;
    }

    results.push({...res,title:fi.title,wc:fi.wc,showW,winW,showL,purse:fightPurse});
  });

  // Award bonuses
  const bonuses=[];
  if(kotdWinner){bonuses.push({label:res=>res.method==='KO/TKO'?'KO of the Night':'Sub of the Night',fighter:kotdWinner,amt:bonusAmt});
    kotdWinner.contract&&(G.fin.cash-=0); // deducted from event profit below
    bonuses[bonuses.length-1]={label:'KO/Sub of the Night 🥊',fighter:kotdWinner,amt:bonusAmt};
  }
  if(fotd.r&&fotd.f1&&fotd.f2){bonuses.push({label:'Fight of the Night ⚔',fighter:fotd.f1,fighter2:fotd.f2,amt:bonusAmt});}
  if(potdWinner&&potdWinner!==kotdWinner){bonuses.push({label:'Performance of the Night ⭐',fighter:potdWinner,amt:bonusAmt});}
  const totalBonuses=bonuses.length*bonusAmt;

  const avgEnt=results.length?Math.round(totEnt/results.length):50;
  const stars=results.filter(r=>r.ent>82).length;

  // Revenue breakdown
  const tierBase={weekly:3e5,fightnight:1.1e6,premium:4e6,supercard:10e6};
  const prestigeMult=G.promo.prestige/80;
  const entMult=avgEnt/70;
  const starBonus=stars>2?1.2:stars>0?1.08:.92;
  const randMult=.88+Math.random()*.24;
  const baseRev=(tierBase[ev.tier]||1e6)*prestigeMult*entMult*starBonus*randMult;

  // Marketing spend boost - increases fill rate and fan trust
  const mktSpend=ev.mktSpend||0;
  const mktFillBoost=mktSpend>0?Math.min(0.18, Math.sqrt(mktSpend/50000)*0.04):0; // diminishing returns, caps at ~18%
  const mktTrustBoost=mktSpend>0?Math.min(1.5, mktSpend/200000):0;

  // Venue fill calc - more realistic
  // Fill is driven by: prestige, fan trust, event tier, fighter star power, venue size relative to demand
  const avgMkt=results.length?results.reduce((s,r)=>{const f=G.roster.find(x=>x.id===r.wId)||G.roster.find(x=>x.id===r.lId);return s+(f?f.s.mkt:60);},0)/results.length:60;
  const starMult=stars>2?1.25:stars>0?1.1:0.9;
  const venueSizeFactor=selVenue.cap<=8000?1.15:selVenue.cap<=20000?1.0:selVenue.cap<=65000?0.82:0.65;
  const tierFillBase={weekly:0.55,fightnight:0.68,premium:0.78,supercard:0.72}[ev.tier]||0.6;
  const demandScore=tierFillBase*(G.promo.prestige/80)*(G.promo.fanTrust/80)*(avgMkt/75)*starMult*venueSizeFactor;
  const regionalFill=getRegionalFillBoost(evLoc.id);
  const fillRate=Math.min(0.99,Math.max(0.08,(demandScore+mktFillBoost+regionalFill+hmFillBoost)*(0.85+Math.random()*.30)));
  const baseTicket={weekly:45,fightnight:90,premium:180,supercard:320}[ev.tier]||80;
  const presBonus=(G.promo.prestige-60)/10*baseTicket*.12;
  const ticketPrice=Math.max(baseTicket*.5, baseTicket+presBonus);
  const gateRev=Math.round(venue.cap*fillRate*ticketPrice*locPopMult);

  // TV/Media
  const tvRev=Math.round((G.fin.mr?.mv||0)*0.15*(ev.tier==='supercard'?2:ev.tier==='premium'?1.5:1));

  // Merch
  const merchRev=Math.round(gateRev*0.08*(1+G.promo.sponsor/100));

  // Sponsor
  const sponsorRev=Math.round(baseRev*0.12*(G.promo.sponsor/80));

  // Venue cost
  const venueCost=Math.round(venue.baseCost*(venue.rentMult||1));

  const travelCost=evLoc?getEffectiveTravelCost(evLoc.id):0;
  const totalRev=gateRev+tvRev+merchRev+sponsorRev;
  const profit=totalRev-venueCost-totalPurses-totalBonuses-travelCost-mktSpend;

  G.fin.cash+=profit;
  G.fin.earned+=totalRev;
  G.fin.gateTotal+=gateRev;
  G.fin.tvTotal+=tvRev;
  G.fin.merchTotal+=merchRev;
  G.fin.sponsorTotal+=sponsorRev;
  G.fin.pursesTotal=(G.fin.pursesTotal||0)+totalPurses;
  G.fin.bonusesTotal=(G.fin.bonusesTotal||0)+totalBonuses;

  G.promo.fanTrust=Math.min(100,Math.max(0,G.promo.fanTrust+(avgEnt>75?1.5:avgEnt<45?-2:0)+mktTrustBoost));
  G.promo.prestige=Math.min(100,Math.max(0,G.promo.prestige+(stars>1?.6:stars>0?.3:-.2)+locPresBns*.15));
  if(locPresBns>0)G.log.push('🌍 '+evLoc.name+' home market bonus: +'+Math.round(locPresBns*.15*10)/10+' prestige');
  if(mktSpend>0)G.log.push('📣 Marketing spend of '+fm(mktSpend)+' boosted fill rate +'+Math.round(mktFillBoost*100)+'% and fan trust +'+mktTrustBoost.toFixed(1));
  if(G.buildings.find(b=>b.id==='media'))G.promo.sponsor=Math.min(100,G.promo.sponsor+.5);

  const rec={id:Date.now(),name:ev.name||(G.promo.name+' '+ev.tier[0].toUpperCase()+ev.tier.slice(1)),
    tier:ev.tier,venue:venue.name,venueCap:venue.cap,fillRate,
    locationId:ev.locationId||'usa_east',locationName:evLoc.name,
    totalRev,gateRev,tvRev,merchRev,sponsorRev,venueCost,totalPurses,totalBonuses,profit,
    bonuses,bonusAmt,results,avgEnt,stars,wk:G.wk,mo:G.mo,yr:G.yr,
    date:MON[G.mo-1]+' '+G.yr,fights:results,numFights:ev.fights.length,mktSpend};
  G.events.push(rec);
  // Update GOAT scores for all fighters in this event
  updateGoatScores(results, rec, bonuses);
  updateGoatRanks();
  // Remove from schedule if this was a scheduled event
  if(ev.schedId)G.schedule=(G.schedule||[]).filter(s=>s.id!==ev.schedId);
  else if(ev.id)G.schedule=(G.schedule||[]).filter(s=>s.id!==ev.id);
  G.log.push('🎯 '+rec.name+' - Revenue: '+fm(totalRev)+' | Profit: '+fm(profit)+' | Ent: '+avgEnt+'/100'+( stars>0?' | ⭐'+stars:''));

  UI.evB=null;
  UI.modal={type:'result',ev:rec};
  render();
}

function scoutRegion(regionId,weeks,quality){
  // weeks: 2-8, quality: 1(basic) 2(standard) 3(elite)
  const region=SCOUT_REGIONS.find(r=>r.id===regionId);
  if(!region)return;
  const qMult=[1,1.8,3.2][quality-1]||1;
  const totalCost=Math.round(region.cost*(weeks/2)*qMult);
  if(G.fin.cash<totalCost){alert('Need '+fm(totalCost)+' for this scouting mission!');return;}
  G.fin.cash-=totalCost;
  // Create pending scout job — reveals after 'weeks' weeks
  G.pendingScouts=G.pendingScouts||[];
  G.pendingScouts.push({
    id:uid(),regionId,weeks,quality,
    revealWk:G.wk+weeks,revealMo:G.mo+(G.wk+weeks>4?Math.floor((G.wk+weeks-1)/4):0),
    revealYr:G.yr,regionName:region.name,cost:totalCost,
    qLabel:['Basic','Standard','Elite'][quality-1],
  });
  G.log.push('🔭 Scout dispatched to '+region.name+' ('+['Basic','Standard','Elite'][quality-1]+' · '+weeks+'wk · '+fm(totalCost)+') — report due Wk'+(G.wk+weeks));
  render();
}

function processScoutJobs(){
  if(!G.pendingScouts||!G.pendingScouts.length)return;
  const toReveal=G.pendingScouts.filter(job=>{
    if(job.revealYr<G.yr)return true;
    if(job.revealYr===G.yr&&job.revealMo<G.mo)return true;
    const totalWk=(job.revealMo-1)*4+job.revealWk;
    const curWk=(G.mo-1)*4+G.wk;
    return curWk>=totalWk;
  });
  toReveal.forEach(job=>{
    G.pendingScouts=G.pendingScouts.filter(j=>j.id!==job.id);
    const region=SCOUT_REGIONS.find(r=>r.id===job.regionId);
    if(!region)return;
    const pool=G.scoutPool.filter(s=>s.region===job.regionId);
    if(!pool.length){G.log.push('🔭 Scout returned from '+job.regionName+' — no new prospects found.');return;}
    // Quality affects how many and how good
    const count=Math.min(pool.length,[1,2,3][job.quality-1]||1);
    const found=pool.sort(()=>Math.random()-.5).slice(0,count);
    found.forEach(raw=>{
      if(G.scouts.find(s=>s.n===raw.n))return;
      const potBonus=job.quality===3?ri(2,6):job.quality===2?ri(0,3):0;
      const scout={...raw,id:uid(),revealed:true,pot:Math.min(99,raw.pot+potBonus),
        signingCost:Math.round(raw.pot*280+(Math.random()*4000)),
        regionTraits:region.traits,regionName:region.name};
      G.scouts.push(scout);
      const wcLabel=ALL_WCN[raw.wc]||raw.wc;
      G.log.push('🔭 Scout report: <scout:'+scout.id+'|'+raw.n+'> — '+wcLabel+', '+raw.nat+' | Potential '+scout.pot+'/100 ('+job.regionName+')');
    });
  });
}

function h(t,a,c){
  const e=document.createElement(t);
  if(a&&typeof a==='object'&&!Array.isArray(a))Object.entries(a).forEach(([k,v])=>{
    if(k==='cls')e.className=v;
    else if(k==='style'&&v&&typeof v==='object'&&!Array.isArray(v))Object.assign(e.style,v);
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='html')e.innerHTML=v;
    else if(k==='disabled'){if(v)e.disabled=true;}
    else if(k==='checked'){e.checked=!!v;}
    else if(k==='selected'){e.selected=!!v;}
    else if(k==='value'&&(t==='input'||t==='textarea'||t==='select')){e.value=v;}
    else if(v!==false&&v!==null&&v!==undefined)e.setAttribute(k,v);
  });
  const kids=Array.isArray(c)?c:c!=null?[c]:[];
  kids.forEach(function _appendChild(ch){
    if(ch==null||ch===false||ch===undefined)return;
    if(Array.isArray(ch)){ch.forEach(_appendChild);return;}
    if(ch instanceof Node)e.appendChild(ch);
    else if(typeof ch==='object'){
      // Likely a stray non-Node object — skip silently in prod
      if(typeof ch.nodeType==='number')e.appendChild(ch);
      // else ignore
    } else {
      e.appendChild(document.createTextNode(String(ch)));
    }
  });
  return e;
}

    G.fin.mr?(()=>{

          h('div',{style:{fontSize:'11px',color:'var(--tx3)'}},[mr.minEventsYr+' events/yr required · min '+mr.minAvgEnt+' avg entertainment']),
        ]),
        h('div',{style:{display:'flex',gap:'6px',flexWrap:'wrap'}},[
          h('div',{style:{padding:'4px 8px',borderRadius:'6px',fontSize:'11px',fontWeight:'700',background:onPace?'rgba(39,174,96,.12)':'rgba(192,57,43,.12)',color:onPace?'var(--grn)':'var(--red)'}},[
            onPace?'✅ On pace':'⚠ Behind — '+evThisYear+'/'+reqByNow+' events',

          h('div',{style:{padding:'4px 8px',borderRadius:'6px',fontSize:'11px',fontWeight:'700',background:qualOk?'rgba(39,174,96,.12)':'rgba(192,57,43,.12)',color:qualOk?'var(--grn)':'var(--red)'}},[
            qualOk?(avgEnt8?'✅ Quality '+avgEnt8:'✅ No events yet'):'⚠ Low quality '+avgEnt8+'/'+mr.minAvgEnt,
          ]),
          !isGood?h('div',{style:{padding:'4px 8px',borderRadius:'6px',fontSize:'11px',fontWeight:'800',background:'rgba(192,57,43,.12)',color:'var(--red)'}},'⚠ Penalty: '+fm(mr.penalty*5)+'/yr'):null,
        ]),
      ]);
    })():null,
    logCard,
    D('g2',[
      D('',[brand,champsCard,...(infCard?[infCard]:[])]),

function vFighterDetail(fid){
  const f=G.roster.find(f=>f.id===fid);
  if(!f){return D('page',[D('ptitle',['Not found']),Btn('← Back',()=>{UI.fDetail=null;render();},'btn btn-s')]);}
  const o=ov(f);
  const divF=G.roster.filter(r=>r.weightClass===f.weightClass).sort((a,b)=>ov(b)-ov(a));
  const divRank=divF.findIndex(r=>r.id===f.id)+1;

  // Gather fight history from completed events
  const fightHistory=[];
  G.events.forEach(ev=>{
    (ev.results||[]).forEach(r=>{
      const isW=r.wId===f.id;
      const isL=r.lId===f.id;
      if(!isW&&!isL)return;
      fightHistory.push({
        date:ev.date,eventName:ev.name,tier:ev.tier,
        result:isW?'W':'L',
        opp:isW?r.lName:r.wName,
        method:r.method,round:r.round,
        isTitle:r.title,
        purse:isW?(r.showW||0)+(r.winW||0):(r.showL||0),
        ent:r.ent,
      });
    });
  });
  fightHistory.sort((a,b)=>b.date?.localeCompare?.(a.date)||0);
  const lifetimeEarnings=fightHistory.reduce((s,h)=>s+h.purse,0);
  const wins=fightHistory.filter(h=>h.result==='W').length;
  const losses=fightHistory.filter(h=>h.result==='L').length;

  const tierColors={champion:'var(--gold)',elite:'var(--blu)',contender:'var(--grn)',prospect:'var(--tx3)'};

    h('div',{style:{display:'flex',alignItems:'center',gap:'10px',marginBottom:'16px'}},[
      Btn('← Back',()=>{UI.fDetail=null;render();},'btn btn-s'),

              h('div',{style:{fontSize:'17px',fontWeight:'900',marginBottom:'3px'}},[f.name]),
              h('div',{style:{fontSize:'12px',color:'var(--tx2)',marginBottom:'7px'}},[f.nat+' · Age '+Math.floor(f.age)+' · '+f.rec.w+'W–'+f.rec.l+'L']),
              D('',[ttag(f.tier),wtag(f.weightClass),...(f.status==='injured'?[S('tag ti',['🤕 Injured '+f.injuryWeeksLeft+'wk'])]:[]),(f.potential?[S('tag te',['⭐ Pot: '+f.potential])]:null),
                (()=>{const ml=getMoraleLabel(f.morale||70);return h('span',{cls:'tag',style:{background:'var(--bg3)',border:'1px solid var(--bd)',color:'var(--tx2)'}},[ml.icon+' '+ml.label+' ('+Math.round(f.morale||70)+')']);})(),
              ]),
            ]),
            ovBadge(o),
          ]),
          D('ct',['Combat Stats']),
          h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'4px 12px'}},[
            ...['Striking','Grappling','Wrestling','Chin','Cardio','Fight IQ'].map((l,i)=>sbar(l,[f.s.str,f.s.grp,f.s.wre,f.s.chi,f.s.car,f.s.iq][i])),

function vFA(){
  if(!UI.faFilter)UI.faFilter='all';
  if(!UI.faWC)UI.faWC='all';
  UI.faSort={col:UI.faSort?.col||'ovr',dir:UI.faSort?.col&&UI.faSort.col!=='ovr'?UI.faSort.dir:-1};
  let agents=[...G.fa];
  if(UI.faFilter!=='all')agents=agents.filter(f=>f.tier===UI.faFilter);
  if(UI.faWC!=='all')agents=agents.filter(f=>f.weightClass===UI.faWC);
  // Sort
  const {col,dir}=UI.faSort;
  agents.sort((a,b)=>{
    let av,bv;
    if(col==='ovr'){av=ov(a);bv=ov(b);}
    else if(col==='name'){av=a.name;bv=b.name;return dir*(av>bv?-1:av<bv?1:0);}
    else if(col==='age'){av=a.age;bv=b.age;}
    else if(col==='rec'){av=a.rec.w/(a.rec.w+a.rec.l+.001);bv=b.rec.w/(b.rec.w+b.rec.l+.001);}
    else if(col==='show'){av=a.contract?.show||0;bv=b.contract?.show||0;}
    else if(col==='tier'){const to={champion:0,elite:1,contender:2,prospect:3};av=to[a.tier]??4;bv=to[b.tier]??4;}
    else if(col==='cha'){av=(a.s.cha+a.s.mkt)/2;bv=(b.s.cha+b.s.mkt)/2;}
    else{av=ov(a);bv=ov(b);}
    return dir*(av-bv);
  });

  const sortHdr=(label,key)=>{
    const active=UI.faSort.col===key;
    return h('th',{style:{cursor:'pointer',userSelect:'none',whiteSpace:'nowrap',
      color:active?'var(--blu)':'var(--tx2)',fontSize:'11px'},
      onClick:()=>{
        if(active)UI.faSort.dir*=-1;
        else UI.faSort={col:key,dir:-1};
        render();
      }},[label+(active?(UI.faSort.dir>0?' ↑':' ↓'):'')]);
  };

  const wcs=[...new Set(G.fa.map(f=>f.weightClass))].sort((a,b)=>{
    const ord=[...WCO,...FWCO];return ord.indexOf(a)-ord.indexOf(b);
  });

  // Scouted prospects section
  const prospects=G.scouts||[];
  const prospectSection=prospects.length>0?D('card',[
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'}},[
      h('div',{},[
        h('div',{style:{fontWeight:'900',fontSize:'15px'}},'🔭 Scouted Prospects'),
        h('div',{style:{fontSize:'12px',color:'var(--tx3)'}},[prospects.length+' prospect'+(prospects.length>1?'s':'')+' awaiting signing decision']),
      ]),
    ]),
    h('div',{style:{display:'flex',flexDirection:'column',gap:'8px'}},[
      ...prospects.map(s=>{
        const can=G.fin.cash>=s.signingCost;
        const potColor=s.pot>=92?'var(--gold)':s.pot>=85?'var(--grn)':s.pot>=78?'var(--blu)':'var(--tx3)';
        return h('div',{style:{display:'flex',alignItems:'center',gap:'12px',padding:'10px 14px',background:'var(--bg3)',borderRadius:'10px',border:'1px solid var(--bd)'}},[
          h('div',{style:{width:'44px',height:'44px',borderRadius:'10px',background:'rgba(39,174,96,.1)',border:'2px solid rgba(39,174,96,.3)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',flexShrink:'0'}},[
            h('div',{style:{fontWeight:'900',fontSize:'15px',color:potColor}},[s.pot+'']),
            h('div',{style:{fontSize:'8px',color:'var(--tx3)',textTransform:'uppercase'}},'POT'),
          ]),
          h('div',{style:{flex:'1',minWidth:'0'}},[
            h('div',{style:{fontWeight:'800',fontSize:'14px'}},[s.n]),
            h('div',{style:{fontSize:'11px',color:'var(--tx2)'}},[s.nat+' · '+(ALL_WCN[s.wc]||s.wc)+' · Age '+s.age]),
            s.regionName?h('div',{style:{fontSize:'10px',color:'var(--tx3)'}},'Scouted from '+s.regionName):null,
          ]),
          h('div',{style:{textAlign:'right',flexShrink:'0'}},[
            h('div',{style:{fontWeight:'700',fontSize:'12px',color:can?'var(--grn)':'var(--red)',marginBottom:'4px'}},[fm(s.signingCost)]),
            h('button',{cls:'btn btn-g btn-sm',disabled:!can,onClick:()=>{UI.modal={type:'signScout',scout:s};render();}},'Sign'),
          ]),
        ]);
      }),
    ]),
  ]):null;

  return D('page',[
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'}},[
      h('div',{},[D('ptitle',['Free Agents ('+G.fa.length+')']),D('psub',['Sign fee = 50% of show money. Rivals sign weekly.'])]),
      h('div',{style:{fontWeight:'900',fontSize:'16px',color:'var(--grn)'}},[fm(G.fin.cash)]),
    ]),
    // Tier chips
    D('chips',[
      ...['all','elite','contender','prospect'].map(t=>h('div',{
        cls:'chip'+(UI.faFilter===t?' on':''),
        onClick:()=>{UI.faFilter=t;render();},
      },[t==='all'?'All ('+G.fa.length+')':t[0].toUpperCase()+t.slice(1)+' ('+G.fa.filter(f=>f.tier===t).length+')'])),
    ]),
    // Division chips
    h('div',{style:{display:'flex',gap:'4px',flexWrap:'wrap',marginBottom:'10px'}},[
      h('div',{cls:'chip'+(UI.faWC==='all'?' on':''),onClick:()=>{UI.faWC='all';render();}},['All Divs']),
      ...wcs.map(wc=>h('div',{cls:'chip'+(UI.faWC===wc?' on':''),onClick:()=>{UI.faWC=wc;render();}},[ALL_WCN[wc]||wc])),
    ]),
    // Table
    h('div',{style:{background:'var(--bg2)',border:'1px solid var(--bd)',borderRadius:'10px',overflow:'auto'}},[
      h('table',{cls:'rt',style:{width:'100%',minWidth:'680px'}},[
        h('thead',{},[h('tr',{},[
          sortHdr('Fighter','name'),
          sortHdr('Division','wc'),
          sortHdr('Rec','rec'),
          sortHdr('Age','age'),
          sortHdr('OVR','ovr'),
          sortHdr('Tier','tier'),
          sortHdr('Star','cha'),
          sortHdr('Contract','show'),
          h('th',{style:{fontSize:'11px'}},'Sign Fee'),
          h('th',{},''),
        ])]),
        h('tbody',{},[
          ...agents.map(f=>{
            const fee=Math.round((f.contract?.show||14000)*0.5);
            const can=G.fin.cash>=fee;
            const starAvg=Math.round((f.s.cha+f.s.mkt)/2);
            return h('tr',{},[
              h('td',{style:{fontWeight:'700',cursor:'pointer',color:'var(--tx)'},
                onClick:()=>{UI.modal={type:'faDetail',f};render();}},[f.name]),
              h('td',{},[wtag(f.weightClass)]),
              h('td',{style:{color:'var(--tx2)',fontSize:'12px'}},[f.rec.w+'–'+f.rec.l]),
              h('td',{style:{color:'var(--tx3)',fontSize:'12px'}},[Math.floor(f.age)]),
              h('td',{},[h('span',{style:{fontWeight:'900',color:sc(ov(f)),fontSize:'14px'}},[ov(f)+''])]),
              h('td',{},[ttag(f.tier)]),
              h('td',{style:{fontSize:'12px',color:sc(starAvg)}},[starAvg+'★']),
              h('td',{style:{fontSize:'11px',color:'var(--tx3)'}},[ctLabel(f.contract)]),
              h('td',{style:{fontWeight:'700',color:can?'var(--grn)':'var(--red)',fontSize:'12px'}},[fm(fee)]),
              h('td',{},[
                h('div',{style:{display:'flex',gap:'3px'}},[
                  h('button',{cls:'btn btn-g btn-sm',
                    disabled:!can,
                    style:{opacity:can?'1':'0.5'},
                    onClick:()=>{
                      if(!can){alert('Need '+fm(fee)+' to sign '+f.name);return;}
                      // Direct sign — no modal
                      signF(f.id);
                    }},'Sign'),
                  h('button',{cls:'btn btn-s btn-sm',onClick:()=>{UI.modal={type:'faDetail',f};render();}},'Info'),
                ]),
              ]),
            ]);
          }),
          agents.length===0?h('tr',{},[h('td',{colspan:10,style:{textAlign:'center',padding:'30px',color:'var(--tx3)'}},'No free agents match filters')]):null,
        ]),
      ]),
    ]),
    // Scouted prospects
    G.scouts.length>0?h('div',{style:{marginTop:'20px'}},[
      D('ptitle',['🔭 Scouted Prospects ('+G.scouts.length+')']),
      D('psub',['Found via regional scouting — raw talent on minimum deals']),
      h('div',{style:{background:'var(--bg2)',border:'1px solid var(--bd)',borderRadius:'10px',overflow:'auto',marginTop:'8px'}},[
        h('table',{cls:'rt',style:{width:'100%'}},[
          h('thead',{},[h('tr',{},[h('th',{},'Name'),h('th',{},'Division'),h('th',{},'Nationality'),h('th',{},'Potential'),h('th',{},'Region'),h('th',{},'Sign Fee'),h('th',{})])]),
          h('tbody',{},[
            ...G.scouts.map(sc=>h('tr',{},[
              h('td',{style:{fontWeight:'700',color:'var(--blu)',cursor:'pointer'},
                onClick:()=>{UI.modal={type:'signScout',scout:sc};render();}},[sc.n]),
              h('td',{},[wtag(sc.wc)]),
              h('td',{style:{fontSize:'12px',color:'var(--tx2)'}},[sc.nat]),
              h('td',{},[h('span',{style:{fontWeight:'900',color:sc.pot>=90?'var(--gold)':sc.pot>=85?'var(--grn)':'var(--tx)'}},[sc.pot+'/100'])]),
              h('td',{style:{fontSize:'12px'}},[sc.regionName||'—']),
              h('td',{style:{color:G.fin.cash>=sc.signingCost?'var(--grn)':'var(--red)',fontWeight:'700'}},[fm(sc.signingCost)]),
              h('td',{},[Btn('Sign',()=>{UI.modal={type:'signScout',scout:sc};render();},'btn btn-g btn-sm')]),
            ])),
          ]),
        ]),
      ]),
    ]):null,
  ]);
}

function vEvents(){
  if(UI.evB)return vEventBuilder();

  const TIER_INFO={
    weekly:{icon:'📅',label:'Weekly Card',col:'#777',minF:3},
    fightnight:{icon:'🥊',label:'Fight Night',col:'var(--blu)',minF:5},
    premium:{icon:'⭐',label:'Premium Event',col:'var(--gold)',minF:6},
    supercard:{icon:'🔥',label:'Supercard',col:'#e74c3c',minF:8},
  };

  // Upcoming scheduled events
  const upcoming=(G.schedule||[]).slice().sort((a,b)=>a.schedWk-b.schedWk||(a.schedMo-b.schedMo)||(a.schedYr-b.schedYr));
  const past=[...G.events].reverse().slice(0,12);

  // ── Full 3-month calendar ──────────────────────────────
  const TC={weekly:'#888',fightnight:'var(--blu)',premium:'var(--gold)',supercard:'#e74c3c'};
  const months=[];
  for(let mi=0;mi<3;mi++){let mo=G.mo+mi,yr=G.yr;if(mo>12){mo-=12;yr++;}months.push({mo,yr});}
  const evMap={};
  const addEv=(k,item)=>{(evMap[k]=evMap[k]||[]).push(item);};
  (G.schedule||[]).forEach(e=>addEv(`${e.schedYr||G.yr}-${e.schedMo||G.mo}-${e.schedWk||1}`,{name:e.name||'Event',tier:e.tier,past:false,id:e.id}));
  G.events.forEach(e=>{if(e.yr&&e.mo&&e.wk)addEv(`${e.yr}-${e.mo}-${e.wk}`,{name:e.name||'Event',tier:e.tier,past:true,id:e.id});});

  const calSection=h('div',{style:{background:'var(--bg2)',border:'1px solid var(--bd)',borderRadius:'10px',padding:'14px',marginBottom:'14px'}},[
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}},[
      h('div',{style:{fontWeight:'800',fontSize:'15px'}},'📆 Event Calendar'),
      h('button',{cls:'btn btn-g',onClick:()=>{UI.evB={tier:'fightnight',name:'',fights:[],venueId:'v3',locationId:'usa_east',selWC:null,selF1:null,ticketMode:'auto',scheduleMode:true,schedWk:G.wk+1>4?1:G.wk+1,schedMo:G.wk+1>4?(G.mo<12?G.mo+1:1):G.mo,schedYr:G.yr};render();}},'+ New Event'),
    ]),
    h('div',{style:{display:'flex',gap:'10px',overflowX:'auto',paddingBottom:'4px'}},[
      ...months.map(({mo,yr})=>{
        const isCurMo=mo===G.mo&&yr===G.yr;
        return h('div',{style:{flex:'1',minWidth:'160px'}},[
          h('div',{style:{textAlign:'center',fontWeight:'800',fontSize:'11px',textTransform:'uppercase',letterSpacing:'.07em',padding:'4px 0 8px',color:isCurMo?'var(--red)':'var(--tx2)'}},
            MON[mo-1]+' '+yr+(isCurMo?' ◀':'')),
          h('div',{style:{display:'flex',flexDirection:'column',gap:'5px'}},[
            ...[1,2,3,4].map(wk=>{
              const isPast=(yr<G.yr)||(yr===G.yr&&mo<G.mo)||(yr===G.yr&&mo===G.mo&&wk<G.wk);
              const isNow=yr===G.yr&&mo===G.mo&&wk===G.wk;
              const slotEvs=(evMap[`${yr}-${mo}-${wk}`]||[]);
              const hasScheduled=slotEvs.some(e=>!e.past);
              return h('div',{
                style:{borderRadius:'8px',padding:'7px 9px',cursor:isPast?'default':'pointer',
                  background:isNow?'rgba(192,57,43,.07)':'var(--bg3)',
                  border:'2px solid '+(isNow?'var(--red)':hasScheduled?'rgba(230,184,0,.5)':'var(--bd)'),
                  opacity:isPast?.5:1,transition:'box-shadow .1s'},
                onMouseenter:function(){if(!isPast)this.style.boxShadow='0 2px 8px rgba(0,0,0,.15)';},
                onMouseleave:function(){this.style.boxShadow='';},
              },[
                h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:slotEvs.length?'5px':'0'}},[
                  h('span',{style:{fontSize:'11px',fontWeight:'700',color:isNow?'var(--red)':'var(--tx3)'}},'Wk '+wk),
                  isNow?h('span',{style:{fontSize:'9px',background:'rgba(192,57,43,.15)',color:'var(--red)',padding:'1px 5px',borderRadius:'4px',fontWeight:'800'}},'NOW'):null,
                  hasScheduled?h('span',{style:{fontSize:'9px',color:'var(--gold)',fontWeight:'700'}},'📌'):null,
                ]),
                ...slotEvs.map(se=>h('div',{
                  style:{fontSize:'11px',fontWeight:'600',display:'flex',alignItems:'center',gap:'4px',
                    color:se.past?'var(--tx3)':TC[se.tier]||'var(--tx2)',cursor:se.past?'pointer':'pointer',
                    padding:'2px 0',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'},
                  onClick:(e)=>{e.stopPropagation();
                    if(se.past){const ev=G.events.find(x=>x.id===se.id);if(ev)UI.modal={type:'eventDetail',ev};}
                    else{const sched=G.schedule.find(x=>x.id===se.id);if(sched){UI.evB={...sched,scheduled:true,schedId:sched.id};}}
                    render();},
                },[
                  TIER_INFO[se.tier]?.icon||'🥊',' ',
                  se.name.length>14?se.name.slice(0,13)+'…':se.name,
                  se.past?h('span',{style:{color:'var(--tx3)',marginLeft:'2px'}},'✓'):null,
                ])),
              ]);
            }),
          ]),
        ]);
      }),
    ]),
  ]);

  // Tier picker for new event
  const tierPicker=D('card',[
    D('ct',['Book New Event']),
    h('div',{style:{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:'8px'}},[
      ...Object.entries(TIER_INFO).map(([k,ti])=>h('div',{
        style:{padding:'12px',background:'var(--bg3)',border:'1px solid var(--bd)',borderRadius:'9px',cursor:'pointer'},
        onClick:()=>{
          const tierVenue={weekly:'v1',fightnight:'v2',premium:'v4',supercard:'v5'};
          UI.evB={tier:k,name:'',fights:[],venueId:tierVenue[k]||VENUES[0].id,locationId:'usa_east',selWC:null,selF1:null,ticketMode:'auto',scheduled:false};render();
        },
      },[
        h('div',{style:{fontSize:'20px',marginBottom:'3px'}},[ti.icon]),
        h('div',{style:{fontWeight:'800',fontSize:'13px',color:ti.col}},[ti.label]),
        h('div',{style:{fontSize:'11px',color:'var(--tx2)',marginTop:'2px'}},[ti.minF+'+ fights']),
      ])),
    ]),
  ]);

  // Past events
  const pastCard=past.length>0?D('card',[
    D('ct',['Event History']),
    h('table',{cls:'rt',style:{width:'100%'}},[
      h('thead',{},[h('tr',{},[h('th',{},['Event']),h('th',{},['Date']),h('th',{},['Location']),h('th',{},['Fights']),h('th',{},['Ent']),h('th',{},['Profit'])])]),
      h('tbody',{},[
        ...past.map(ev=>h('tr',{style:{cursor:'pointer'},onClick:()=>{UI.modal={type:'eventDetail',ev};render();}},[
          h('td',{style:{fontWeight:'600'}},[TIER_INFO[ev.tier]?.icon+' '+ev.name]),
          h('td',{style:{fontSize:'12px',color:'var(--tx2)'}},[MON[ev.mo-1]+' '+ev.yr]),
          h('td',{style:{fontSize:'11px',color:'var(--tx3)'}},[ev.locationName||'—']),
          h('td',{},[ev.fights?.length||0]),
          h('td',{},[h('span',{style:{fontWeight:'700',color:sc(ev.avgEnt)}},[ev.avgEnt||'—'])]),
          h('td',{style:{fontWeight:'700',color:ev.profit>=0?'var(--grn)':'var(--red)'}},[fm(ev.profit||0)]),
        ])),
      ]),
    ]),
  ]):null;

  return D('page',[
    D('ptitle',['Events']),
    calSection,
    tierPicker,
    pastCard,
  ]);
}

function vEventBuilder(){
  const ev=UI.evB;
  const tLabel={weekly:'Weekly Card',fightnight:'Fight Night',premium:'Premium',supercard:'Supercard'};
  const minF=EV_MIN[ev.tier]||3;
  const maxF=EV_MAX[ev.tier]||10;
  const used=new Set(ev.fights.flatMap(f=>[f.f1Id,f.f2Id]));
  const selVenue=VENUES.find(v=>v.id===ev.venueId)||VENUES[0];
  const selLoc=EVENT_LOCATIONS.find(l=>l.id===ev.locationId)||EVENT_LOCATIONS[0];
  const locBonus=(selLoc.presBonus||{})[G.promo.id]||0;
  const locRegion=LOC_TO_REGION[selLoc.id]||'';
  const locRegDef=REGION_DEFS[locRegion];
  const locRegLevel=(G.regionalPresence||{})[locRegion]||0;
  const effTravelCost=getEffectiveTravelCost(selLoc.id);
  const locFillBoost=getRegionalFillBoost(selLoc.id);
  const locPresBoost=getRegionalPresBoost(selLoc.id);

  // Build set of fighters already booked in OTHER scheduled events
  const thisEvId=ev.schedId||ev.id||null;
  const scheduledElsewhere=new Set(
    (G.schedule||[])
      .filter(s=>s.id!==thisEvId)
      .flatMap(s=>(s.fights||[]).flatMap(f=>[f.f1Id,f.f2Id]))
  );

  // How many weeks until the event (for medical suspension check)
  const evWk=ev.schedWk||G.wk, evMo=ev.schedMo||G.mo, evYr=ev.schedYr||G.yr;
  const weeksUntilEv=(evYr-G.yr)*48+(evMo-G.mo)*4+(evWk-G.wk);

  // Get unavailability reason for a fighter (null = available)
  function unavailReason(f){
    if(used.has(f.id))return null; // already on THIS card, handled separately
    if(scheduledElsewhere.has(f.id))return'Already booked';
    if(f.status==='injured'){
      if(f.injuryWeeksLeft>weeksUntilEv)return'Suspended ('+f.injuryWeeksLeft+'wk left)';
    }
    return null;
  }

  // avail for a given WC - returns {available:[], unavailable:[]} with reasons
  function availSplit(wc){
    const all=G.roster.filter(f=>f.weightClass===wc&&!used.has(f.id)).sort((a,b)=>(TO[a.tier]??4)-(TO[b.tier]??4)||ov(b)-ov(a));
    const available=[], unavailable=[];
    all.forEach(f=>{
      const reason=unavailReason(f);
      if(reason)unavailable.push({f,reason});
      else available.push(f);
    });
    return{available,unavailable};
  }
  const avail=wc=>availSplit(wc).available;

  // Smart auto-fill based on event tier
  // weekly: prospects/contenders only, no elites/champs
  // fightnight: contenders + 1 elite possible, no champs
  // premium: elites + possible title fight
  // supercard: everything including title fights
  function autoFill(){
    const usedS=new Set(used);const newF=[];
    // Helper: weeks since last fight (approx)
    function wksSinceFight(f){
      if(!f.lastFightYr)return 999;
      const yrDiff=G.yr-f.lastFightYr, moDiff=(yrDiff*12)+(G.mo-f.lastFightMo);
      return moDiff*4+(G.wk-f.lastFightWk);
    }
    // Tier pools per event type
    const tierFilter={
      weekly:f=>f.tier==='prospect'||f.tier==='contender',
      fightnight:f=>f.tier==='prospect'||f.tier==='contender'||(f.tier==='elite'&&!f.isChamp),
      premium:f=>true,
      supercard:f=>true,
    }[ev.tier]||(f=>true);
    const maxTitleFights={weekly:0,fightnight:0,premium:2,supercard:3}[ev.tier]||0;
    let titleFightsAdded=0;

    WCO.concat(FWCO).forEach(wc=>{
      if(ev.fights.length+newF.length>=maxF)return;
      // Exclude injured (suspension won't clear by event), already used, booked elsewhere, and recently fought (<6 weeks ago)
      const pool=G.roster.filter(f=>
        f.weightClass===wc&&
        !usedS.has(f.id)&&
        !scheduledElsewhere.has(f.id)&&
        tierFilter(f)&&
        wksSinceFight(f)>=6&&
        (f.status==='active'||(f.status==='injured'&&f.injuryWeeksLeft<=weeksUntilEv))
      ).sort((a,b)=>ov(b)-ov(a));
      if(pool.length<2)return;

      const champInPool=pool.find(f=>f.isChamp);
      let f1,f2,isTitle=false;
      if(champInPool&&titleFightsAdded<maxTitleFights){
        const challenger=pool.filter(f=>!f.isChamp)[0];
        if(challenger){f1=champInPool;f2=challenger;isTitle=true;titleFightsAdded++;}
      }
      if(!f1){
        const nonChamps=pool.filter(f=>!f.isChamp);
        if(nonChamps.length<2)return;
        f1=nonChamps[0];f2=nonChamps[1];
      }
      newF.push({id:Date.now()+newF.length,f1Id:f1.id,f2Id:f2.id,title:isTitle,wc});
      usedS.add(f1.id);usedS.add(f2.id);
    });
    ev.fights=[...ev.fights,...newF.slice(0,maxF-ev.fights.length)];render();
  }

  const canRun=ev.fights.length>=minF;

  // Venue picker
  const venueSection=D('card',[
    D('ct',['Select Venue']),
    h('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'8px'}},[
      ...VENUES.map(v=>{
        const tierOk={weekly:['small','medium'],fightnight:['small','medium'],premium:['medium','large'],supercard:['large']}[ev.tier]||['small'];
        const recommended=tierOk.includes(v.tier);
        return h('div',{cls:'wcc'+(ev.venueId===v.id?' on':'')+(recommended?' rec':''),
          style:{padding:'10px',textAlign:'left',position:'relative'},
          onClick:()=>{ev.venueId=v.id;render();}},[
          h('div',{style:{fontWeight:'700',fontSize:'12px',marginBottom:'1px'}},[v.name]),
          h('div',{style:{fontSize:'11px',color:'var(--tx3)',marginBottom:'3px'}},[v.cap.toLocaleString()+' capacity']),
          h('div',{style:{fontSize:'12px',fontWeight:'700',color:recommended?'var(--grn)':'var(--red)'}},[fm(v.baseCost)+' cost']),
          ...(recommended?[h('div',{style:{fontSize:'9px',color:'var(--grn)',fontWeight:'700',marginTop:'2px'}},'✓ Recommended')]:[h('div',{style:{fontSize:'9px',color:'var(--tx3)',marginTop:'2px'}},'⚠ Not ideal')]),
        ]);
      }),
    ]),
    h('div',{style:{marginTop:'10px',padding:'8px',background:'var(--bg3)',borderRadius:'7px',fontSize:'12px',color:'var(--tx2)'}},[
      h('strong',{},[selVenue.name+': ']),selVenue.desc,
      h('div',{style:{marginTop:'4px',color:'var(--tx3)'}},'Cost: '+fm(selVenue.baseCost)+' · Cap: '+selVenue.cap.toLocaleString()+' · Estimated fill depends on fan trust, event quality, and prestige.'),
    ]),
  ]);

  // Matchmaking panel
  const allWCs=[...WCO,...FWCO].filter(wc=>avail(wc).length>=1||(ev.fights.some(f=>f.wc===wc)));
  const mmPanel=D('card',[
    D('ct',['Add Fight - Division: '+(ALL_WCN[ev.selWC]||'Select below')]),
    h('div',{style:{display:'flex',gap:'5px',flexWrap:'wrap',marginBottom:'10px'}},[
      ...allWCs.map(wc=>{
        const cnt=avail(wc).length;
        return h('div',{cls:'chip'+(ev.selWC===wc?' on':'')+(cnt<2?' disabled':''),
          style:{opacity:cnt<2?.5:1},
          onClick:()=>{if(cnt>=1){ev.selWC=wc;ev.selF1=null;render();}}},[ALL_WCN[wc]+'('+cnt+')']);
      }),
    ]),
    ...(ev.selWC?[
      h('div',{style:{fontWeight:'600',fontSize:'13px',marginBottom:'7px',padding:'6px',background:'rgba(192,57,43,.06)',borderRadius:'6px'}},[
        ev.selF1?'Step 2: Pick opponent for '+ev.selF1.name:('Step 1: Pick Fighter 1 - '+(avail(ev.selWC).length)+' available in '+ALL_WCN[ev.selWC]),
      ]),
      D('ol',[
        ...availSplit(ev.selWC).available.map(f=>{
          const isF1=ev.selF1?.id===f.id;
          return h('div',{cls:'or'+(isF1?' on':''),style:{gap:'0',padding:'0'}},[
            h('div',{style:{display:'flex',alignItems:'center',gap:'8px',padding:'8px 10px',flex:'1',cursor:'pointer'},onClick:()=>{
              if(!ev.selF1){ev.selF1=f;render();}
              else if(ev.selF1.id!==f.id){
                ev.fights=[...ev.fights,{id:Date.now(),f1Id:ev.selF1.id,f2Id:f.id,title:ev.selF1.isChamp||f.isChamp,wc:ev.selWC}];
                ev.selF1=null;render();
              }
            }},[
              ovBadge(ov(f)),
              h('div',{style:{flex:'1',minWidth:0}},[
                h('div',{style:{fontWeight:'700',fontSize:'13px',display:'flex',alignItems:'center',gap:'6px',flexWrap:'wrap'}},[
                  // Clickable name → open fighter detail in modal
                  h('span',{style:{cursor:'pointer',textDecoration:'underline',textDecorationStyle:'dotted',color:'var(--red)'},
                    onClick:(e)=>{e.stopPropagation();UI.modal={type:'fighterPreview',fid:f.id};render();}},[f.name]),
                  f.isChamp?h('span',{style:{fontSize:'10px'}},'🏆'):null,
                  isF1?h('span',{style:{color:'var(--red)',fontWeight:'900',fontSize:'10px',background:'rgba(192,57,43,.15)',borderRadius:'3px',padding:'1px 5px'}},'F1 ✓'):null,
                ]),
                h('div',{style:{fontSize:'11px',color:'var(--tx2)',marginTop:'2px',display:'flex',gap:'8px',flexWrap:'wrap'}},[
                  h('span',{},[f.rec.w+'W–'+f.rec.l+'L']),
                  h('span',{},[f.nat]),
                  h('span',{style:{color:'var(--tx3)'}},[f.contract?('Show: '+fm(f.contract.show)+(f.contract.win?' + '+fm(f.contract.win)+' win':'')):'No contract']),
                  f.winStreak>=3?h('span',{style:{color:'var(--grn)',fontWeight:'700'}},[f.winStreak+' streak 🔥']):null,
                ]),
              ]),
              ttag(f.tier),
            ]),
          ]);
        }),
        ...availSplit(ev.selWC).unavailable.map(({f,reason})=>{
          return h('div',{cls:'or',style:{opacity:'0.42',cursor:'not-allowed',pointerEvents:'none',background:'var(--bg3)'}},[
            ovBadge(ov(f)),
            D('',[
              h('div',{style:{fontWeight:'700',fontSize:'13px',color:'var(--tx2)'}},[f.name]),
              h('div',{style:{fontSize:'11px',color:'var(--tx3)'}},[f.rec.w+'–'+f.rec.l+' · '+f.nat]),
            ]),
            h('span',{style:{fontSize:'10px',fontWeight:'700',color:'var(--red)',background:'rgba(192,57,43,.12)',padding:'2px 6px',borderRadius:'4px',whiteSpace:'nowrap'}},reason),
          ]);
        }),
        ...(availSplit(ev.selWC).available.length===0?[h('div',{style:{color:'var(--tx3)',fontSize:'12px',padding:'12px',textAlign:'center'}},'No available fighters in this division')]:[]),
      ]),
      ...(ev.selF1?[Btn('Cancel selection',()=>{ev.selF1=null;render();},'btn btn-s btn-sm')]:[]),
    ]:[h('div',{style:{color:'var(--tx3)',fontSize:'13px',padding:'10px',textAlign:'center'}},'Select a weight class above')]),
  ]);

  const totalFights=ev.fights.length;
  const cardPreview=D('card',[
    D('ct',['Card ('+totalFights+'/'+maxF+' fights · min '+minF+' required)']),
    ...(!canRun&&totalFights>0?[D('al al-w',['Need at least '+minF+' fights for a '+tLabel[ev.tier]])]:[]),
    // Purse summary
    ...(totalFights>0?(()=>{
      const totalShow=ev.fights.reduce((s,fi)=>{
        const f1=G.roster.find(f=>f.id===fi.f1Id),f2=G.roster.find(f=>f.id===fi.f2Id);
        return s+(f1?.contract?.show||0)+(f2?.contract?.show||0);
      },0);
      const totalWinBonus=ev.fights.reduce((s,fi)=>{
        const f1=G.roster.find(f=>f.id===fi.f1Id),f2=G.roster.find(f=>f.id===fi.f2Id);
        // Both might win; estimate one win bonus per fight (the likely winner gets it)
        return s+Math.max(f1?.contract?.win||0,f2?.contract?.win||0);
      },0);
      const bonusPool=(ev.bonusAmt!==undefined?ev.bonusAmt:{weekly:10000,fightnight:30000,premium:75000,supercard:100000}[ev.tier]||50000)*3;
      const loTotal=totalShow;

      return [h('div',{style:{display:'flex',gap:'8px',marginBottom:'10px',padding:'9px 10px',background:'rgba(192,57,43,.06)',border:'1px solid rgba(192,57,43,.2)',borderRadius:'8px',fontSize:'12px',flexWrap:'wrap'}},[
        h('span',{style:{color:'var(--tx2)'}},'💸 Estimated purses:'),
        h('span',{style:{fontWeight:'800',color:'var(--red)'}},[fm(loTotal)+' – '+fm(hiTotal)]),
        h('span',{style:{color:'var(--tx3)'}},'(show money + win bonuses + up to 3 night bonuses)'),

    })():[]),
    ...(totalFights===0?[h('div',{style:{color:'var(--tx3)',fontSize:'12px',textAlign:'center',padding:'14px 0'}},'Use auto-fill or add fights manually')]
    // Show fights in reverse so main event (index 0) is at TOP, fight 1 is at BOTTOM
    :[...ev.fights].map((fi,realIdx)=>({fi,realIdx})).reverse().map(({fi,realIdx})=>{

                      // Adjust total ovhd proportionally
                      G.promo.ovhd=Math.max(500000,G.promo.ovhd+diff);
                      sp[cat.key]=newAmt/G.promo.ovhd;
                      // Normalize fractions so they sum to 1

        ]),

        const avgEnt=G.events.length?Math.round(G.events.slice(-10).reduce((s,e)=>s+e.avgEnt,0)/Math.min(10,G.events.length)):0;
        const minE=G.promo.mr.minEventsYr||0;
        const minQ=G.promo.mr.minAvgEnt||0;

        const maxTs=Math.max(1,...['champion','elite','contender','prospect'].map(t=>ro.filter(f=>f.tier===t).reduce((s,f)=>s+(f.contract?.show||0)+(f.contract?.win||0),0)/Math.max(1,ro.filter(f=>f.tier===t).length)));

  // ── WEIGHT CLASS MOVE MODAL ─────────────────────────────
